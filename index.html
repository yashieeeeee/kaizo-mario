<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<meta charset="utf-8">

<title>Kaizo World Adventure</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow:hidden;font-family:'Orbitron',monospace;}

/* в”Җв”Җ HUD в”Җв”Җ */
#hud{
  width:100%;flex-shrink:0;
  background:linear-gradient(180deg,#1a1a2e 0%,#0f0f1a 100%);
  border-bottom:2px solid #ffffff11;
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 20px;gap:8px;
  box-shadow:0 2px 20px #00000088;
}
.hud-logo{
  font-family:'Press Start 2P',monospace;font-size:10px;
  background:linear-gradient(90deg,#ff6600,#ffdd00,#ff6600);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:2px;filter:drop-shadow(0 0 6px #ff660088);
  white-space:nowrap;
}
.hud-pill{
  display:flex;align-items:center;gap:6px;
  background:#ffffff08;border:1px solid #ffffff15;
  border-radius:20px;padding:4px 12px;
  font-size:10px;color:#aaa;letter-spacing:1px;
  white-space:nowrap;
}
.hud-pill .val{
  font-family:'Press Start 2P',monospace;font-size:9px;
  color:#fff;letter-spacing:0;
}
.hud-pill .icon{font-size:13px;line-height:1;}
#timerPill .val{color:#ffdd00;}
#timerPill.urgent .val{color:#ff4444;animation:pulse .4s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* в”Җв”Җ CANVAS в”Җв”Җ */
#canvasWrap{
  position:relative;flex:1 1 auto;
  display:flex;align-items:center;justify-content:center;
  width:100%;overflow:hidden;
  background:#000;
}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

/* в”Җв”Җ OVERLAY (death / win panels) в”Җв”Җ */
#overlay{
  position:fixed;inset:0;z-index:200;
  display:none;flex-direction:column;justify-content:center;align-items:center;gap:0;
  background:rgba(0,0,0,0);
  transition:background .3s;
  pointer-events:none;
}
#overlay.show{display:flex;background:rgba(0,0,0,0.72);pointer-events:all;}
#overlayPanel{
  background:linear-gradient(160deg,#0d0d1f,#1a0808);
  border:2px solid #ff333355;
  border-radius:4px;
  padding:36px 52px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  box-shadow:0 0 60px #ff000033, inset 0 0 40px #00000088;
  min-width:320px;max-width:90vw;
  position:relative;overflow:hidden;
}
#overlayPanel::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px);
  pointer-events:none;
}
#overlayPanel.win{
  background:linear-gradient(160deg,#001a0d,#0d1a00);
  border-color:#00ff8855;
  box-shadow:0 0 60px #00ff0022, inset 0 0 40px #00000088;
}
#bigMsg{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(18px,3.5vw,32px);
  color:#fff;letter-spacing:3px;text-align:center;
  text-shadow:0 0 20px currentColor;
  animation:glitch .35s infinite;
}
#bigMsg.win-msg{color:#00ff88;animation:glow 1s infinite alternate;}
@keyframes glow{from{text-shadow:0 0 10px #00ff88}to{text-shadow:0 0 30px #00ff88,0 0 60px #00ff8844}}
@keyframes glitch{
  0%  {text-shadow:3px 0 #f00,-3px 0 #00f}
  25% {text-shadow:-3px 0 #f00, 3px 0 #00f}
  50% {text-shadow:3px 0 #f0f,-3px 0 #0ff}
  75% {text-shadow:-2px 0 #f00, 2px 0 #00f}
  100%{text-shadow:3px 0 #f00,-3px 0 #00f}
}
#subMsg{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,1.4vw,11px);
  color:#ffdd00;letter-spacing:2px;text-align:center;
  opacity:.85;
}
.ovl-stats{
  display:flex;gap:24px;margin:4px 0;
}
.ovl-stat{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-size:9px;color:#555;letter-spacing:1px;
}
.ovl-stat span{
  font-family:'Press Start 2P',monospace;font-size:13px;color:#fff;
}
.ovl-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,#ffffff22,transparent);}
.ovl-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.ovl-btn{
  font-family:'Press Start 2P',monospace;
  padding:12px 28px;font-size:clamp(8px,1.3vw,10px);
  cursor:pointer;letter-spacing:2px;
  border-radius:2px;transition:all .15s;
  border:2px solid currentColor;background:transparent;
  position:relative;overflow:hidden;
}
.ovl-btn::before{
  content:'';position:absolute;inset:0;
  background:currentColor;opacity:0;transition:opacity .15s;
}
.ovl-btn:hover::before{opacity:.15;}
.ovl-btn:active{transform:scale(.97);}
.btn-retry{color:#00ff88;}
.btn-menu {color:#ffdd00;}

/* в”Җв”Җ CONTROLS BAR в”Җв”Җ */
#controls{
  font-family:'Orbitron',monospace;
  font-size:9px;color:#2a2a3a;letter-spacing:2px;
  text-align:center;padding:4px 0;flex-shrink:0;
  width:100%;background:#000;
}

/* в”Җв”Җ TOUCH BUTTONS в”Җв”Җ */
#touchpad{
  display:none;width:100%;
  background:linear-gradient(180deg,#0f0f1a,#080810);
  border-top:1px solid #ffffff0a;
  padding:10px 20px;
  justify-content:space-between;align-items:center;flex-shrink:0;
}
@media(max-width:700px),(pointer:coarse){#touchpad{display:flex}#controls{display:none}}
.tbtn{
  background:linear-gradient(160deg,#1e1e30,#12121e);
  border:2px solid #ffffff1a;color:#fff;
  font-size:22px;width:64px;height:64px;
  border-radius:14px;cursor:pointer;
  user-select:none;-webkit-user-select:none;
  display:flex;align-items:center;justify-content:center;
  touch-action:none;
  box-shadow:0 4px 12px #00000066, inset 0 1px 0 #ffffff18;
  transition:all .08s;
}
.tbtn:active,.tbtn.pressed{
  background:linear-gradient(160deg,#2a2a44,#1a1a2e);
  border-color:#ffffff33;
  box-shadow:0 2px 6px #00000066, inset 0 0 8px #ffffff08;
  transform:translateY(2px);
}
#tJ{width:90px;font-size:13px;font-family:'Press Start 2P',monospace;color:#00ff88;border-color:#00ff8833;letter-spacing:1px;}
#tJ.pressed{color:#fff;background:linear-gradient(160deg,#004422,#002211);}

/* в”Җв”Җ ROTATE MASK в”Җв”Җ */
#rotateMask{
  display:none;position:fixed;inset:0;
  background:linear-gradient(135deg,#000010,#100000);
  z-index:9999;flex-direction:column;justify-content:center;align-items:center;
  color:#fff;font-size:18px;font-weight:bold;text-align:center;gap:16px;
}
@media(orientation:portrait) and (max-width:500px){#rotateMask{display:flex}}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hud-logo">KAIZO вҳ…</div>
  <div class="hud-pill">рҹҢҚ <span class="val" id="hW">SELECT</span></div>
  <div class="hud-pill">рҹ“Қ LV <span class="val" id="hLv">-</span></div>
  <div class="hud-pill">рҹ’Җ <span class="val" id="hD">0</span></div>

<div id="overlay">

    <div id="bigMsg"></div>
    <div id="subMsg"></div>
    <div class="ovl-divider"></div>
    <div class="ovl-stats">

    <div class="ovl-btns">

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=640,H=400;
const wrap=document.getElementById('canvasWrap');

function resize(){
  const hudH   = document.getElementById('hud').offsetHeight;
  const ctrlH  = document.getElementById('controls').offsetHeight || 0;
  const padH   = document.getElementById('touchpad').offsetHeight || 0;
  const avW    = window.innerWidth;
  const avH    = window.innerHeight - hudH - ctrlH - padH;

  // Fill as much of the available space as possible, keep 8:5 ratio
  let w = avW;
  let h = w * (H / W);
  if(h > avH){ h = avH; w = h * (W / H); }

  cv.style.width  = w + 'px';
  cv.style.height = h + 'px';
  wrap.style.width  = '100%';
  wrap.style.height = avH + 'px';
}
window.addEventListener('resize',resize);
resize();

// в”Җв”Җ INPUT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let tL=false,tR=false,tJump=false,tJumpFresh=false;

['tL','tR','tJ'].forEach(id=>{
  const el=document.getElementById(id);
  const press=()=>{
    if(id==='tL')tL=true;
    if(id==='tR')tR=true;
    if(id==='tJ'){tJump=true;tJumpFresh=true;}
    el.classList.add('pressed');
  };
  const release=()=>{
    if(id==='tL')tL=false;
    if(id==='tR')tR=false;
    if(id==='tJ')tJump=false;
    el.classList.remove('pressed');
  };
  el.addEventListener('touchstart',e=>{e.preventDefault();press();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();release();},{passive:false});
  el.addEventListener('mousedown',press);
  el.addEventListener('mouseup',release);
});

const K={};let jumpFresh=false;
document.addEventListener('keydown',e=>{
  resumeAudio();
  if(K[e.key])return;
  K[e.key]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp',' ','z','Z','r','R','Escape'].includes(e.key))e.preventDefault();
  if(e.key==='ArrowUp'||e.key===' '||e.key==='z'||e.key==='Z'){jumpFresh=true;}
  if(e.key==='r'||e.key==='R')onRestart();
  if(e.key==='Escape')goWorldSelect();
});
document.addEventListener('keyup',e=>{K[e.key]=false;});

// mouse click on canvas (world select)

function canvasPos(cx,cy){const r=cv.getBoundingClientRect();return{x:(cx-r.left)*(W/r.width),y:(cy-r.top)*(H/r.height)};}
cv.addEventListener('mousemove',e=>{const p=canvasPos(e.clientX,e.clientY);mouseX=p.x;mouseY=p.y;});
cv.addEventListener('click',e=>{const p=canvasPos(e.clientX,e.clientY);mouseX=p.x;mouseY=p.y;mouseClicked=true;});
cv.addEventListener('touchend',e=>{const t=e.changedTouches[0];const p=canvasPos(t.clientX,t.clientY);mouseX=p.x;mouseY=p.y;mouseClicked=true;e.preventDefault();},{passive:false});

// в”Җв”Җ HUD REFS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

const hC=document.getElementById('hC'),hT=document.getElementById('hT'),hW=document.getElementById('hW');
const bigMsg=document.getElementById('bigMsg'),subMsg=document.getElementById('subMsg');
const ovDeath=document.getElementById('ovDeath'),ovCoins=document.getElementById('ovCoins');

// в”Җв”Җ SCREEN SHAKE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let shakeFrames=0, shakeMag=0;
function triggerShake(mag=8,dur=12){ shakeMag=mag; shakeFrames=dur; }
function applyShake(){
  if(shakeFrames>0){
    const dx=(Math.random()-.5)*shakeMag;
    const dy=(Math.random()-.5)*shakeMag;
    ctx.save(); ctx.translate(dx,dy);
    shakeFrames--; shakeMag*=0.85;
    return true;
  }
  return false;
}

// в”Җв”Җ SCREEN FLASH в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let flashAlpha=0, flashColor='#fff';
function triggerFlash(col='#fff',alpha=0.55){ flashColor=col; flashAlpha=alpha; }
function drawFlash(){
  if(flashAlpha>0.01){
    ctx.fillStyle=flashColor;
    ctx.globalAlpha=flashAlpha;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
    flashAlpha*=0.72;
  }
}

// в”Җв”Җ WEB AUDIO SOUNDS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,type,dur,vol=0.18,detune=0){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type; o.frequency.value=freq;
    if(detune)o.detune.value=detune;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur);
  }catch(e){}
}
function sndJump(){ beep(320,'square',0.12,0.12); beep(480,'square',0.09,0.07); }
function sndCoin(){ beep(880,'sine',0.1,0.15); beep(1200,'sine',0.08,0.12); }
function sndDie(){
  beep(220,'sawtooth',0.08,0.2);
  setTimeout(()=>beep(160,'sawtooth',0.15,0.22),80);
  setTimeout(()=>beep(110,'sawtooth',0.22,0.25),180);
}
function sndStomp(){ beep(600,'square',0.07,0.18); beep(400,'square',0.1,0.14); }
function sndClear(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.2,0.2),i*100)); }
function resumeAudio(){ if(AC.state==='suspended')AC.resume(); }

// в”Җв”Җ INIT LEVEL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function initLevel(i){
  resumeAudio();
  lvlIdx=i;
  LV=LEVELS[i];
  curWorld=WORLDS.find(w=>i>=w.lr[0]&&i<=w.lr[1]);

  hW.textContent=curWorld.name;
  hLv.textContent=(i-curWorld.lr[0])+1;
  hT.textContent=300;
  timerPill.classList.remove('urgent');

  // Update HUD accent colour to match world
  document.getElementById('hud').style.borderBottomColor=curWorld.color+'44';

  player={
    x:LV.ps.x, y:LV.ps.y,
    vx:0, vy:0,
    w:18, h:22,
    onGround:false,
    jumpHeld:false,
    jumpFrames:0,
    dead:false,
    deadTimer:0
  };

  camX=0; frame=0; timer=300; timerTick=0; particles=[];
  movPlats = (LV.mp||[]).map(p=>({...p}));
  coinSt   = (LV.co||[]).map(()=>false);
  invSt    = (LV.ib||[]).map(()=>false);
  enSt     = (LV.en||[]).map(e=>({...e,alive:true}));

  gameState='playing';
  overlay.classList.remove('show');
  jumpFresh=false; tJumpFresh=false; K._jdown=false;
}

// в”Җв”Җ WORLD SELECT / RESTART в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function goWorldSelect(){
  gameState='worldSelect';
  overlay.classList.remove('show');
  hW.textContent='SELECT'; hLv.textContent='-'; hT.textContent='---';
  timerPill.classList.remove('urgent');
  document.getElementById('hud').style.borderBottomColor='';
}

function onRestart(){ initLevel(lvlIdx); }
function startWorld(wi){ curWorld=WORLDS[wi]; initLevel(curWorld.lr[0]); }

// в”Җв”Җ SHOW OVERLAY в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showOverlay(title, sub, isWin){
  bigMsg.textContent=title;
  bigMsg.className=isWin?'win-msg':'';
  subMsg.textContent=sub;
  ovDeath.textContent=deaths;
  ovCoins.textContent=totalCoins;
  overlayPanel.className=isWin?'win':'';
  overlay.classList.add('show');
}

// в”Җв”Җ HELPERS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function overlap(ax,ay,aw,ah, bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function allSolids(){ return [...LV.sol, ...movPlats]; }

function spawnP(x,y,col,n){
  for(let i=0;i<n;i++)
    particles.push({
      x, y,
      vx:(Math.random()-.5)*5,
      vy:Math.random()*-5-2,
      life:30, col,
      r:Math.random()*4+2
    });
}

function updParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.3; p.life--;
    return p.life>0;
  });
}

// в”Җв”Җ MOVING PLATFORMS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function updMovPlats(){
  for(const p of movPlats){
    if(p.dx!==undefined){
      p.x+=p.dx;
      if(p.x<p.mn || p.x+p.w>p.mx) p.dx*=-1;
    }
    if(p.dy!==undefined){
      p.y+=p.dy;
      if(p.y<p.mn || p.y>p.mx) p.dy*=-1;
    }
  }
}

// в”Җв”Җ ENEMIES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function updEnemies(){
  for(const e of enSt){
    if(!e.alive) continue;
    e.x+=e.vx;
    if(e.x<=e.mn || e.x>=e.mx) e.vx*=-1;

    if(!player.dead){
      if(overlap(player.x,player.y,player.w,player.h, e.x,e.y,22,20)){
        // stomp from above
        if(player.vy>0 && player.y+player.h < e.y+12){
          e.alive=false;
          player.vy=-7;
          spawnP(e.x+9,e.y+10,'#ffaa44',10);
          totalCoins++; hC.textContent=totalCoins;
          sndStomp();
          triggerFlash('#ffffff',0.18);
        } else {
          die();
        }
      }
    }
  }
}

// в”Җв”Җ DIE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function die(){
  if(player.dead) return;
  player.dead=true;
  player.deadTimer=60;
  player.vy=-9;
  player.vx=(Math.random()-.5)*3;
  spawnP(player.x+9,player.y+11,'#ff4444',18);
  spawnP(player.x+9,player.y+11,'#ff8800',10);
  deaths++; hD.textContent=deaths;
  sndDie();
  triggerShake(10,16);
  triggerFlash('#ff0000',0.45);
}

// в”Җв”Җ PLAYER UPDATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const MAX_JUMP_FRAMES=10; // hold longer than this = no more boost

function updPlayer(){
  // в”Җ Dead animation в”Җ
  if(player.dead){
    player.deadTimer--;
    player.vy+=LV.grav;
    player.x+=player.vx;
    player.y+=player.vy;
    if(player.deadTimer<=0){
      const msgs=[
        ['OOPS!','Try again!'],
        ['YOU DIED','One more try!'],
        ['SO CLOSE','Keep going!'],
        ['NICE TRY','Almost!'],
        ['UNLUCKY!','You got this!'],
        ['AW MAN!','Deaths: '+deaths],
        ['KEEP GOING','Deaths: '+deaths],
        ['BREATHE...','Deaths: '+deaths],
        ['DONT GIVE UP','Deaths: '+deaths],
      ];
      const m=msgs[Math.min(Math.floor(deaths/2), msgs.length-1)];
      showOverlay(m[0], m[1], false);
      gameState='dead';
    }
    return;
  }

  // в”Җ Timer в”Җ
  timerTick++;
  if(timerTick>=60){
    timerTick=0; timer--; hT.textContent=timer;
    if(timer<=10) timerPill.classList.add('urgent');
    if(timer<=0) die();
  }

  // в”Җ Read input в”Җ
  const holdingJump = K['ArrowUp']||K[' ']||K['z']||K['Z']||tJump;
  const freshJump   = jumpFresh||tJumpFresh;
  jumpFresh=false; tJumpFresh=false;

  // в”Җ Horizontal в”Җ
  player.vx=0;
  if(K['ArrowLeft'] ||K['a']||tL) player.vx=-SPD;
  if(K['ArrowRight']||K['d']||tR) player.vx= SPD;

  // в”Җ Jump START (only when on ground) в”Җ
  if(freshJump && player.onGround){
    player.vy=LV.jf;
    player.jumpHeld=true;
    player.jumpFrames=0;
    sndJump();
  }

  // в”Җ Jump HOLD boost вҖ” LIMITED to MAX_JUMP_FRAMES в”Җ
  if(player.jumpHeld && holdingJump && player.vy<0 && player.jumpFrames<MAX_JUMP_FRAMES){
    player.vy-=0.6;       // small upward nudge each frame
    player.jumpFrames++;
  }
  if(!holdingJump) player.jumpHeld=false;  // release early = shorter jump

  // в”Җ Gravity в”Җ
  player.vy+=LV.grav;
  if(player.vy>MAXFALL) player.vy=MAXFALL;

  // в”Җ X movement + horizontal collision в”Җ
  player.x+=player.vx;
  player.x=Math.max(0, Math.min(LV.width-player.w, player.x));
  for(const p of allSolids()){
    if(overlap(player.x,player.y,player.w,player.h, p.x,p.y,p.w,p.h)){
      if(player.vx>0) player.x=p.x-player.w;
      else            player.x=p.x+p.w;
      player.vx=0;
    }
  }

  // в”Җ Invisible blocks (hit from below) в”Җ
  for(let i=0;i<invSt.length;i++){
    if(invSt[i]) continue;
    const ib=LV.ib[i];
    if(player.vy<0
       && player.x+player.w>ib.x && player.x<ib.x+ib.w
       && player.y+player.vy<=ib.y+ib.h && player.y>ib.y){
      invSt[i]=true;
      player.vy=4;
      player.jumpHeld=false;
      spawnP(ib.x+10,ib.y,'#FFD700',6);
    }
  }

  // в”Җ Y movement в”Җ
  player.onGround=false;
  player.y+=player.vy;

  // в”Җ Trampolines в”Җ
  for(const t of (LV.tr||[])){
    if(player.vy>0
       && overlap(player.x,player.y,player.w,player.h, t.x,t.y,t.w,t.h)
       && player.y+player.h-player.vy<=t.y+4){
      player.y=t.y-player.h;
      player.vy=LV.jf*1.4;
      player.onGround=true;
      player.jumpHeld=false;
    }
  }

  // в”Җ Vertical collision with solids в”Җ
  for(const p of allSolids()){
    if(overlap(player.x,player.y,player.w,player.h, p.x,p.y,p.w,p.h)){
      if(player.vy>0 && player.y+player.h-player.vy<=p.y+4){
        player.y=p.y-player.h;
        player.vy=0;
        player.onGround=true;
        player.jumpHeld=false;
        if(p.dx!==undefined) player.x+=p.dx; // ride platform
      } else if(player.vy<0){
        player.y=p.y+p.h;
        player.vy=2;
        player.jumpHeld=false;
      }
    }
  }

  // в”Җ Spikes в”Җ
  for(const s of (LV.spk||[])){
    const sy = s.f==='u' ? (s.y||350) : (s.y||0);
    if(overlap(player.x+2,player.y+4,player.w-4,player.h-4, s.x,sy,s.w,12)) die();
  }

  // в”Җ Lava / liquid hazard в”Җ
  for(const lv of (LV.lv||[])){
    if(overlap(player.x,player.y,player.w,player.h, lv.x,lv.y,lv.w,lv.h)) die();
  }

  // в”Җ Fall off screen в”Җ
  if(player.y>H+100) die();

  // в”Җ Collect coins в”Җ
  (LV.co||[]).forEach((c,i)=>{
    if(!coinSt[i] && overlap(player.x,player.y,player.w,player.h, c.x-8,c.y-8,16,16)){
      coinSt[i]=true;
      totalCoins++; hC.textContent=totalCoins;
      spawnP(c.x,c.y,'#FFD700',7);
      sndCoin();
    }
  });

  // в”Җ Goal flag в”Җ
  if(overlap(player.x,player.y,player.w,player.h, LV.gx,LV.gy,30,H-LV.gy)){
    if(lvlIdx<curWorld.lr[1]){
      sndClear();
      triggerFlash('#00ff88',0.35);
      showOverlay('LEVEL CLEAR!','Get ready for level '+((lvlIdx-curWorld.lr[0])+2)+'!',true);
      gameState='win';
      setTimeout(()=>initLevel(lvlIdx+1), 2200);
    } else {
      sndClear(); sndClear();
      triggerFlash('#FFD700',0.5);
      showOverlay(curWorld.name+' CLEAR!','You legend! Deaths: '+deaths,true);
      gameState='worldClear';
    }
  }

  // в”Җ Camera в”Җ
  camX=Math.max(0, Math.min(LV.width-W, player.x-W/3));
}

// в”Җв”Җ WORLD SELECT SCREEN в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const CARDS=[
  {x:30, y:68, w:272,h:144,wi:0},
  {x:338,y:68, w:272,h:144,wi:1},
  {x:30, y:228,w:272,h:144,wi:2},
  {x:338,y:228,w:272,h:144,wi:3},
];

function drawWorldSelect(){
  // Deep space background
  ctx.fillStyle='#00001a'; ctx.fillRect(0,0,W,H);

  // Animated star field
  for(let i=0;i<120;i++){
    const sx=(i*139+50)%W, sy=(i*97+20)%H;
    const b=Math.sin(frame*0.04+i*0.7)>0.3;
    const size=b?2:1;
    const brightness=b?0.9:0.2+(i%5)*0.06;
    ctx.fillStyle=`rgba(${180+i%70},${180+i%50},255,${brightness})`;
    ctx.fillRect(sx,sy,size,size);
  }

  // Shooting star
  const ss=Math.floor(frame/80)%4;
  const ssp=(frame%80)/80;
  const sx1=ss*180+ssp*200, sy1=30+ss*60;
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(sx1,sy1); ctx.lineTo(sx1-40*ssp,sy1-15*ssp); ctx.stroke();

  // Title with animated gradient
  ctx.save();
  const tg=ctx.createLinearGradient(0,0,W,0);
  const tp=((frame*0.008)%1);
  tg.addColorStop(Math.max(0,tp-.3),'#ff6600');
  tg.addColorStop(tp,           '#ffdd00');
  tg.addColorStop(Math.min(1,tp+.3),'#ff6600');
  ctx.fillStyle=tg;
  ctx.font='bold 20px "Press Start 2P"';
  ctx.textAlign='center';
  ctx.shadowColor='#ff8800'; ctx.shadowBlur=18;
  ctx.fillText('KAIZO WORLD',W/2,36);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.font='7px "Press Start 2P"';
  ctx.fillText('вҖ” CHOOSE YOUR WORLD вҖ”',W/2,52);
  ctx.restore();

  // Cards
  for(const card of CARDS){
    const wm=WORLDS[card.wi];
    const hov=mouseX>=card.x&&mouseX<=card.x+card.w&&mouseY>=card.y&&mouseY<=card.y+card.h;
    const pulse=Math.sin(frame*0.05+card.wi*1.2)*0.5+0.5;

    // Card shadow
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(card.x+4,card.y+4,card.w,card.h);

    // Card background with gradient
    const cg=ctx.createLinearGradient(card.x,card.y,card.x,card.y+card.h);
    cg.addColorStop(0,hov ? wm.dark+'ff' : '#0d0d18');
    cg.addColorStop(1,hov ? '#000000' : '#06060d');
    ctx.fillStyle=cg; ctx.fillRect(card.x,card.y,card.w,card.h);

    // Animated world-colour inner glow on hover
    if(hov){
      const ig=ctx.createRadialGradient(card.x+card.w/2,card.y+card.h,0,card.x+card.w/2,card.y+card.h/2,card.w*.6);
      ig.addColorStop(0,wm.color+'18');
      ig.addColorStop(1,'transparent');
      ctx.fillStyle=ig; ctx.fillRect(card.x,card.y,card.w,card.h);
    }

    // Top bar
    const barH=4;
    const bg=ctx.createLinearGradient(card.x,card.y,card.x+card.w,card.y);
    bg.addColorStop(0,wm.color);
    bg.addColorStop(0.5,wm.color+'cc');
    bg.addColorStop(1,wm.color+'55');
    ctx.fillStyle=bg; ctx.fillRect(card.x,card.y,card.w,barH);

    // Border
    ctx.lineWidth=hov?2:1;
    ctx.strokeStyle=hov ? wm.color : wm.color+'33';
    if(hov){ ctx.shadowColor=wm.color; ctx.shadowBlur=hov?12:0; }
    ctx.strokeRect(card.x,card.y,card.w,card.h);
    ctx.shadowBlur=0;

    // Mini animated scene in top-right corner of card
    ctx.save();
    ctx.beginPath();
    ctx.rect(card.x+card.w-84,card.y+barH,80,60);
    ctx.clip();
    drawMiniScene(card.x+card.w-84,card.y+barH,80,60,wm.id);
    ctx.restore();

    // Emoji + Name
    ctx.font='20px serif'; ctx.textAlign='left';
    ctx.fillText(wm.emoji, card.x+10, card.y+36);

    ctx.fillStyle=wm.color;
    ctx.font='bold 9px "Press Start 2P"';
    ctx.shadowColor=wm.color; ctx.shadowBlur=hov?8:0;
    ctx.fillText(wm.name, card.x+10, card.y+60);
    ctx.shadowBlur=0;

    ctx.fillStyle='rgba(160,160,180,0.6)';
    ctx.font='6px "Press Start 2P"';
    ctx.fillText(wm.sub, card.x+10, card.y+76);

    // Difficulty dots
    const filled=wm.diff.split('вҳ…').length-1;
    for(let d=0;d<4;d++){
      ctx.fillStyle=d<filled ? wm.color : wm.color+'33';
      ctx.beginPath();
      ctx.arc(card.x+10+d*14,card.y+100,4,0,Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle='rgba(120,120,140,0.5)';
    ctx.font='6px "Press Start 2P"';
    ctx.fillText('2 LEVELS', card.x+70, card.y+103);

    // Play button hint
    if(hov){
      const btnX=card.x+card.w-70, btnY=card.y+card.h-24;
      ctx.fillStyle=wm.color+'22';
      ctx.fillRect(btnX,btnY,60,16);
      ctx.strokeStyle=wm.color;
      ctx.lineWidth=1; ctx.strokeRect(btnX,btnY,60,16);
      ctx.fillStyle=wm.color;
      ctx.font='6px "Press Start 2P"';
      ctx.textAlign='center';
      ctx.fillText('в–¶ PLAY',btnX+30,btnY+11);
      ctx.textAlign='left';
    }
  }

  // Footer
  ctx.fillStyle='rgba(60,60,80,0.7)';
  ctx.font='7px "Press Start 2P"';
  ctx.textAlign='center';
  ctx.fillText('DEATHS: '+deaths+'   В·   COINS: '+totalCoins, W/2, H-8);
  ctx.textAlign='left';

  drawCRT();

  // Click handling
  if(mouseClicked){
    for(const card of CARDS){
      if(mouseX>=card.x&&mouseX<=card.x+card.w&&mouseY>=card.y&&mouseY<=card.y+card.h){
        startWorld(card.wi);
      }
    }
  }
}

// в”Җв”Җ MINI ANIMATED WORLD PREVIEW в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawMiniScene(x,y,w,h,worldId){
  const bg={land:['#5c94fc','#a8d8ff'],sea:['#001a4d','#003399'],mine:['#0d0700','#1a0e00'],space:['#000008','#000520']};
  const [c1,c2]=bg[worldId];
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);

  if(worldId==='land'){
    // Ground
    ctx.fillStyle='#44aa22'; ctx.fillRect(x,y+h-12,w,4);
    ctx.fillStyle='#5a3000'; ctx.fillRect(x,y+h-8,w,8);
    // Platform
    ctx.fillStyle='#5a3000'; ctx.fillRect(x+30,y+h-28,30,4);
    ctx.fillStyle='#44aa22'; ctx.fillRect(x+30,y+h-28,30,2);
    // Mini player
    const mx=x+10+(frame%60)*0.4;
    ctx.fillStyle='#cc0000'; ctx.fillRect(mx,y+h-22,6,3);
    ctx.fillStyle='#ffcc99'; ctx.fillRect(mx,y+h-19,6,4);
    ctx.fillStyle='#0033cc'; ctx.fillRect(mx,y+h-15,6,3);
    // Coin sparkle
    ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(x+50,y+h-32+Math.sin(frame*.1)*2,3,0,Math.PI*2); ctx.fill();
  }
  if(worldId==='sea'){
    // Bubbles
    for(let i=0;i<5;i++){
      const bx=x+8+i*14, by=y+h-5-((i*17+frame*0.5)%h);
      ctx.fillStyle='rgba(100,200,255,0.4)';
      ctx.beginPath(); ctx.arc(bx,by,2,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='#002855'; ctx.fillRect(x,y+h-8,w,8);
    ctx.fillStyle='#0055aa'; ctx.fillRect(x,y+h-8,w,2);
    // Fish
    const fx=x+(frame%80);
    ctx.fillStyle='#ff6600'; ctx.fillRect(fx%w+x,y+h-22,8,5);
  }
  if(worldId==='mine'){
    ctx.fillStyle='#2e1500'; ctx.fillRect(x,y+h-8,w,8);
    // Gold sparkles
    for(let i=0;i<4;i++){
      const gx=x+8+i*18, gy=y+h-5;
      if(Math.floor(frame/8+i)%3===0){
        ctx.fillStyle='rgba(255,200,0,0.7)';
        ctx.fillRect(gx,gy-2,2,4); ctx.fillRect(gx-2,gy,4,2);
      }
    }
    // Bat flying
    const bx=x+(frame%70); const by2=y+10+Math.sin(frame*.08)*6;
    ctx.fillStyle='#330044';
    ctx.fillRect(bx%w+x,by2,6,4);
    ctx.fillRect((bx-8)%w+x,by2+1,7,2);
    ctx.fillRect((bx+6)%w+x,by2+1,7,2);
  }
  if(worldId==='space'){
    // Stars
    for(let i=0;i<12;i++){
      const blink=Math.sin(frame*.06+i*1.3)>0.3;
      ctx.fillStyle=blink?'#fff':'rgba(150,150,255,0.4)';
      ctx.fillRect(x+i*7,y+i*4%h,blink?2:1,blink?2:1);
    }
    ctx.fillStyle='#12123a'; ctx.fillRect(x,y+h-8,w,8);
    // Alien
    const ax=x+(frame%70);
    ctx.fillStyle='#009900'; ctx.fillRect(ax%w+x,y+h-20,7,6);
    ctx.fillStyle='#00ee00'; ctx.fillRect((ax)%w+x+1,y+h-22,5,3);
  }
}

// в”Җв”Җ DRAW BACKGROUND в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,LV.bg[0]); g.addColorStop(1,LV.bg[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  if(LV.wt==='land'){
    // Fluffy clouds (parallax)
    ctx.fillStyle='rgba(255,255,255,0.82)';
    for(const c of [{x:80,y:55,r:22},{x:230,y:42,r:18},{x:410,y:62,r:26},{x:570,y:46,r:20}]){
      const cx=(c.x-(camX*0.2)+LV.width)%(W+140)-70;
      ctx.beginPath();
      ctx.arc(cx,      c.y,   c.r,    0,Math.PI*2);
      ctx.arc(cx+c.r,  c.y-8, c.r*.7, 0,Math.PI*2);
      ctx.arc(cx+c.r*1.8,c.y, c.r*.55,0,Math.PI*2);
      ctx.fill();
    }
    // Birds (simple V shapes)
    for(let i=0;i<3;i++){
      const bx=((i*220+frame*0.4)%W);
      const by=40+i*18+Math.sin(frame*0.03+i)*6;
      ctx.strokeStyle='rgba(0,0,80,0.25)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(bx-8,by); ctx.lineTo(bx,by-5); ctx.lineTo(bx+8,by);
      ctx.stroke();
    }
  }

  if(LV.wt==='sea'){
    // Rising bubbles
    for(let i=0;i<28;i++){
      const bx=((i*137+(frame*0.5|0))%(W+40))-20;
      const by=((i*97+frame*0.8)%H);
      ctx.fillStyle=`rgba(100,200,255,${0.06+i%3*0.03})`;
      ctx.beginPath(); ctx.arc(bx,by,(i%3)+1.5,0,Math.PI*2); ctx.fill();
    }
    // Light shafts from surface
    ctx.fillStyle='rgba(80,160,255,0.018)';
    for(let i=0;i<4;i++){
      const rx=(i*180-(camX*0.04))%W;
      ctx.beginPath();
      ctx.moveTo(rx,0); ctx.lineTo(rx-28,H); ctx.lineTo(rx+28,H); ctx.lineTo(rx+56,0);
      ctx.fill();
    }
  }

  if(LV.wt==='mine'){
    // Floating dust specks
    for(let i=0;i<50;i++){
      const rx=((i*137-camX*0.3+LV.width)%W);
      const ry=(i*97)%H;
      ctx.fillStyle='rgba(90,55,10,0.09)';
      ctx.fillRect(rx,ry,(i%3)+1,(i%3)+1);
    }
    // Warm lantern glows along the path
    for(let i=0;i<5;i++){
      const lx=((i*700-camX+LV.width)%LV.width)-camX;
      if(lx>-80&&lx<W+80){
        const pulse=0.1+Math.sin(frame*0.06+i)*0.03;
        const lg=ctx.createRadialGradient(lx,310,0,lx,310,80);
        lg.addColorStop(0,`rgba(255,160,0,${pulse})`);
        lg.addColorStop(1,'transparent');
        ctx.fillStyle=lg;
        ctx.beginPath(); ctx.arc(lx,310,80,0,Math.PI*2); ctx.fill();
      }
    }
  }

  if(LV.wt==='space'){
    // Twinkling stars (parallax)
    for(let i=0;i<90;i++){
      const sx=((i*139+50-camX*0.07+LV.width)%(W+8));
      const sy=(i*97+20)%H;
      const b=Math.sin(frame*0.04+i)>0.35;
      ctx.fillStyle=`rgba(${b?'255,255,255':'160,160,255'},${b?0.9:0.28})`;
      ctx.fillRect(sx,sy,b?2:1,b?2:1);
    }
    // Nebula colour blobs
    const nb=['rgba(80,0,180,0.04)','rgba(0,60,200,0.04)','rgba(160,0,100,0.03)'];
    for(let i=0;i<3;i++){
      const nx=((i*280+60-camX*0.04)%(W+100));
      const ng=ctx.createRadialGradient(nx,i*100+55,0,nx,i*100+55,100);
      ng.addColorStop(0,nb[i]); ng.addColorStop(1,'transparent');
      ctx.fillStyle=ng;
      ctx.beginPath(); ctx.arc(nx,i*100+55,100,0,Math.PI*2); ctx.fill();
    }
    // Distant planet
    const px=((1100-camX*0.1)+LV.width)%W;
    if(px>-80&&px<W+80){
      ctx.fillStyle='rgba(90,50,150,0.13)';
      ctx.beginPath(); ctx.arc(px,72,46,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(110,70,170,0.08)';
      ctx.beginPath(); ctx.ellipse(px,72,76,11,-0.2,0,Math.PI*2); ctx.fill();
    }
  }
}

// в”Җв”Җ DRAW SOLID PLATFORM в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawSolid(p){
  const x=p.x-camX;

  if(LV.wt==='land'){
    ctx.fillStyle='#5a3000'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#44aa22'; ctx.fillRect(x,p.y,p.w,6);
    ctx.fillStyle='#33881a'; ctx.fillRect(x,p.y+6,p.w,3);
    // Grass dots
    ctx.fillStyle='#55dd33';
    for(let i=6;i<p.w-4;i+=10){
      ctx.fillRect(x+i,p.y-2,2,3);
    }
  }

  else if(LV.wt==='sea'){
    ctx.fillStyle='#002855'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#0055aa'; ctx.fillRect(x,p.y,p.w,5);
    ctx.fillStyle='#ff6644'; ctx.fillRect(x,p.y,p.w,2); // coral top line
    // Small coral tufts on wider platforms
    if(p.w>50&&Math.floor(p.x/70)%2===0){
      ctx.fillStyle='#008800';
      ctx.fillRect(x+5, p.y-9, 4,10);
      ctx.fillRect(x+17,p.y-13,4,14);
    }
  }

  else if(LV.wt==='mine'){
    ctx.fillStyle='#2e1500'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#4a2800'; ctx.fillRect(x,p.y,p.w,5);
    // Gold vein flecks
    ctx.fillStyle='rgba(255,190,0,0.22)';
    for(let i=0;i<p.w;i+=16) ctx.fillRect(x+i,p.y+2,5,2);
    ctx.strokeStyle='#1a0800'; ctx.lineWidth=1;
    ctx.strokeRect(x,p.y,p.w,p.h);
  }

  else if(LV.wt==='space'){
    ctx.fillStyle='#12123a'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#22225a'; ctx.fillRect(x,p.y,p.w,4);
    // LED dots along top
    ctx.fillStyle='#4444bb';
    for(let i=5;i<p.w;i+=18){
      ctx.beginPath(); ctx.arc(x+i,p.y+2,2,0,Math.PI*2); ctx.fill();
    }
  }
}

// в”Җв”Җ DRAW MOVING PLATFORM в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawMovPlat(p){
  const x=p.x-camX;
  const styles={
    land: ['#883300','#cc5500'],
    sea:  ['#002d77','#0066cc'],
    mine: ['#441a00','#ddaa00'],
    space:['#1d0055','#6600cc'],
  };
  const [c1,c2]=styles[LV.wt]||styles.land;
  ctx.fillStyle=c1; ctx.fillRect(x,p.y,p.w,p.h);
  ctx.fillStyle=c2; ctx.fillRect(x,p.y,p.w,4);
  ctx.strokeStyle=c2; ctx.lineWidth=1.5; ctx.strokeRect(x,p.y,p.w,p.h);
  // Arrow hint
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText(p.dx?'вҶ”':'вҶ•', x+p.w/2, p.y+11);
  ctx.textAlign='left';
}

// в”Җв”Җ DRAW SPIKES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawSpike(s){
  const sy = s.f==='u' ? (s.y||350) : (s.y||0);
  const num = Math.floor(s.w/10);
  const cols={land:'#aaaacc', sea:'#ffee00', mine:'#dd7700', space:'#aa00ff'};
  ctx.fillStyle=cols[LV.wt]||'#aaaacc';
  for(let i=0;i<num;i++){
    const sx=s.x-camX+i*10;
    ctx.beginPath();
    if(s.f==='u'){
      ctx.moveTo(sx,   sy+12);
      ctx.lineTo(sx+5, sy);
      ctx.lineTo(sx+10,sy+12);
    } else {
      ctx.moveTo(sx,   sy);
      ctx.lineTo(sx+5, sy+12);
      ctx.lineTo(sx+10,sy);
    }
    ctx.closePath(); ctx.fill();
  }
}

// в”Җв”Җ DRAW HAZARD LIQUID (lava / acid / plasma / electric sand) в”Җ
function drawLava(lv){
  const t=frame*0.05, x=lv.x-camX;

  if(LV.wt==='sea'){
    // Electric sand вҖ” yellow
    ctx.fillStyle='#665500'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#ffee00';
    for(let i=0;i<lv.w;i+=10){
      ctx.fillRect(x+i, lv.y+Math.sin(t*2+i*0.4)*3, 8, 4);
    }
    ctx.fillStyle='rgba(255,220,0,0.28)'; ctx.fillRect(x,lv.y,lv.w,3);
  }
  else if(LV.wt==='mine'){
    // Acid вҖ” green
    ctx.fillStyle='#002200'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#00aa00';
    for(let i=0;i<lv.w;i+=12){
      ctx.fillRect(x+i, lv.y+Math.sin(t+i*0.3)*3, 10, 5);
    }
    ctx.fillStyle='rgba(0,200,0,0.28)'; ctx.fillRect(x,lv.y,lv.w,3);
  }
  else if(LV.wt==='space'){
    // Void plasma вҖ” purple
    ctx.fillStyle='#180030'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#aa00ff';
    for(let i=0;i<lv.w;i+=12){
      ctx.fillRect(x+i, lv.y+Math.sin(t*3+i*0.3)*3, 10, 5);
    }
    ctx.fillStyle='rgba(170,0,255,0.28)'; ctx.fillRect(x,lv.y,lv.w,3);
  }
  else {
    // Classic lava вҖ” land / default
    ctx.fillStyle='#cc2200'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#ff4400';
    for(let i=0;i<lv.w;i+=12){
      ctx.fillRect(x+i, lv.y+Math.sin(t+i*0.3)*3, 10, 6);
    }
    ctx.fillStyle='rgba(255,100,0,0.45)'; ctx.fillRect(x,lv.y,lv.w,4);
  }
}

// в”Җв”Җ DRAW COINS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawCoin(c,i){
  if(coinSt[i]) return;
  const t=frame*0.07+i;
  const cx=c.x-camX, cy=c.y-Math.sin(t)*3;
  const cols={land:'#FFD700', sea:'#00ffcc', mine:'#FFD700', space:'#cc88ff'};
  ctx.fillStyle=cols[LV.wt]||'#FFD700';
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(cx-2,cy-2,3,0,Math.PI*2); ctx.fill();
}

// в”Җв”Җ DRAW INVISIBLE BLOCK (after revealed) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawInvis(ib,i){
  if(!invSt[i]) return;
  const x=ib.x-camX;
  ctx.fillStyle='#c84000'; ctx.fillRect(x,ib.y,ib.w,ib.h);
  ctx.fillStyle='#ff8844'; ctx.fillRect(x+2,ib.y+2,ib.w-4,4);
  ctx.strokeStyle='#881500'; ctx.lineWidth=1; ctx.strokeRect(x,ib.y,ib.w,ib.h);
}

// в”Җв”Җ DRAW TRAMPOLINE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawTramp(t){
  const x=t.x-camX;
  const styles={
    land: ['#338833','#66ff66'],
    sea:  ['#004488','#0099ff'],
    mine: ['#885500','#ffcc00'],
    space:['#330077','#9933ff'],
  };
  const [c1,c2]=styles[LV.wt]||styles.land;
  ctx.fillStyle=c1; ctx.fillRect(x,t.y,t.w,t.h);
  ctx.fillStyle=c2; ctx.fillRect(x+3,t.y+2,t.w-6,4);
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1;
  ctx.strokeRect(x,t.y,t.w,t.h);
}

// в”Җв”Җ DRAW ENEMY в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawEnemy(e){
  if(!e.alive) return;
  const x=e.x-camX;

  if(e.t==='goomba'){
    ctx.fillStyle='#8B4513'; ctx.fillRect(x,e.y,18,16);
    ctx.fillStyle='#f5deb3'; ctx.fillRect(x+2,e.y+2,14,8);
    ctx.fillStyle='#fff';    ctx.fillRect(x+3,e.y+3,4,4); ctx.fillRect(x+11,e.y+3,4,4);
    ctx.fillStyle='#000';    ctx.fillRect(x+(e.vx<0?4:5),e.y+4,2,2); ctx.fillRect(x+(e.vx<0?12:13),e.y+4,2,2);
    ctx.fillStyle='#333';    ctx.fillRect(x-2,e.y+16,8,4); ctx.fillRect(x+12,e.y+16,8,4);
  }

  else if(e.t==='koopa'){
    ctx.fillStyle='#228800'; ctx.fillRect(x,e.y,22,18);
    ctx.fillStyle='#aaff44'; ctx.fillRect(x+3,e.y+2,16,12);
    ctx.fillStyle='#ffee00'; ctx.fillRect(x+4,e.y+2,14,8);
    ctx.fillStyle='#000';    ctx.fillRect(x+(e.vx<0?5:11),e.y+4,3,3);
    ctx.fillStyle='#333';    ctx.fillRect(x,e.y+18,9,4); ctx.fillRect(x+13,e.y+18,9,4);
  }

  else if(e.t==='fish'){
    ctx.fillStyle='#ff6600'; ctx.fillRect(x,e.y+3,18,12);
    ctx.fillStyle='#ff9944'; ctx.fillRect(x+2,e.y+3,14,8);
    ctx.fillStyle='#fff';    ctx.fillRect(x+3,e.y+5,4,4);
    ctx.fillStyle='#000';    ctx.fillRect(x+4,e.y+6,2,2);
    // Tail fin
    ctx.fillStyle='#ff6600';
    if(e.vx<0){ ctx.beginPath(); ctx.moveTo(x+18,e.y+3); ctx.lineTo(x+26,e.y); ctx.lineTo(x+26,e.y+18); ctx.fill(); }
    else       { ctx.beginPath(); ctx.moveTo(x,e.y+3); ctx.lineTo(x-8,e.y); ctx.lineTo(x-8,e.y+18); ctx.fill(); }
    // Dorsal fin
    ctx.fillStyle='#ff4400'; ctx.fillRect(x+5,e.y,8,4);
  }

  else if(e.t==='eel'){
    ctx.fillStyle='#888800'; ctx.fillRect(x,e.y+2,26,10);
    ctx.fillStyle='#dddd00'; ctx.fillRect(x+2,e.y+3,22,6);
    ctx.fillStyle='#000';    ctx.fillRect(x+(e.vx<0?3:18),e.y+4,3,3);
    // Electric flash
    if(frame%10<5){ ctx.fillStyle='rgba(255,255,100,0.28)'; ctx.fillRect(x-3,e.y,32,16); }
  }

  else if(e.t==='bat'){
    // Body
    ctx.fillStyle='#330044'; ctx.fillRect(x+3,e.y+4,12,10);
    // Eyes
    ctx.fillStyle='#ff00cc'; ctx.fillRect(x+5,e.y+5,4,4); ctx.fillRect(x+9,e.y+5,4,4);
    ctx.fillStyle='#000';    ctx.fillRect(x+6,e.y+6,2,2); ctx.fillRect(x+10,e.y+6,2,2);
    // Flapping wings
    const wingUp=Math.sin(frame*0.3)>0;
    ctx.fillStyle='#220033';
    if(wingUp){
      ctx.beginPath(); ctx.moveTo(x+3,e.y+6); ctx.lineTo(x-9,e.y+1); ctx.lineTo(x+1,e.y+12); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x+15,e.y+6); ctx.lineTo(x+27,e.y+1); ctx.lineTo(x+17,e.y+12); ctx.fill();
    } else {
      ctx.beginPath(); ctx.moveTo(x+3,e.y+6); ctx.lineTo(x-9,e.y+15); ctx.lineTo(x+1,e.y+12); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x+15,e.y+6); ctx.lineTo(x+27,e.y+15); ctx.lineTo(x+17,e.y+12); ctx.fill();
    }
  }

  else if(e.t==='alien'){
    ctx.fillStyle='#003a00'; ctx.fillRect(x,e.y+4,20,14);
    ctx.fillStyle='#009900'; ctx.fillRect(x+3,e.y+2,14,16);
    ctx.fillStyle='#00ee00'; ctx.fillRect(x+5,e.y+3,10,8);
    ctx.fillStyle='#fff';    ctx.fillRect(x+5,e.y+4,5,5); ctx.fillRect(x+11,e.y+4,5,5);
    ctx.fillStyle='#ff0000'; ctx.fillRect(x+6,e.y+5,3,3); ctx.fillRect(x+12,e.y+5,3,3);
    // Antennae
    ctx.fillStyle='#00ee00';
    ctx.fillRect(x+7,e.y,2,4); ctx.fillRect(x+13,e.y,2,4);
    ctx.beginPath(); ctx.arc(x+8, e.y,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+14,e.y,3,0,Math.PI*2); ctx.fill();
  }
}

// в”Җв”Җ DRAW GOAL FLAG в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawGoal(){
  const x=LV.gx-camX, y=LV.gy;
  const poleCol ={land:'#888', sea:'#00bbff', mine:'#ffaa00', space:'#8800ff'};
  const flagCol ={land:'#ff3333', sea:'#ffff00', mine:'#ff8800', space:'#00ffff'};
  // Pole
  ctx.fillStyle=poleCol[LV.wt]||'#888';
  ctx.fillRect(x+12,y,5,H-y);
  // Waving flag
  const wave=Math.sin(frame*0.07)*7;
  ctx.fillStyle=flagCol[LV.wt]||'#ff3333';
  ctx.beginPath();
  ctx.moveTo(x+17,y+4);
  ctx.lineTo(x+44+wave,y+15);
  ctx.lineTo(x+17,y+28);
  ctx.fill();
  // Star on top
  ctx.fillStyle='#FFD700';
  ctx.font='16px monospace';
  ctx.textAlign='left';
  ctx.fillText('вҳ…',x+4, y-4+Math.sin(frame*0.04)*3);
}

// в”Җв”Җ DRAW PLAYER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawPlayer(){
  if(!player.dead && player.y>H+50) return;
  const x=player.x-camX, y=player.y;
  ctx.globalAlpha=player.dead ? 0.5 : 1;

  // Ground shadow
  if(player.onGround){
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(x+9,y+player.h+1,10,3,0,0,Math.PI*2); ctx.fill();
  }
  // Hat
  ctx.fillStyle='#cc0000';
  ctx.fillRect(x,y,18,7);
  ctx.fillRect(x-2,y+5,22,4);
  // Face
  ctx.fillStyle='#ffcc99'; ctx.fillRect(x,y+8,18,9);
  // Moustache
  ctx.fillStyle='#442200'; ctx.fillRect(x+2,y+14,14,3);
  // Eyes
  ctx.fillStyle='#222'; ctx.fillRect(x+3,y+9,3,3); ctx.fillRect(x+11,y+9,3,3);
  ctx.fillStyle='#fff'; ctx.fillRect(x+4,y+9,2,2);  ctx.fillRect(x+12,y+9,2,2);
  // Overalls
  ctx.fillStyle='#0033cc'; ctx.fillRect(x,y+17,18,5);
  ctx.fillStyle='#cc0000'; ctx.fillRect(x,y+17,6,4); ctx.fillRect(x+12,y+17,6,4);
  // Feet (walk animation)
  ctx.fillStyle='#331100';
  if(player.vx!==0){
    const f=Math.floor(frame/8)%2;
    ctx.fillRect(x+(f?4:-2),y+20,9,4);
    ctx.fillRect(x+(f?9:11),y+20,9,4);
  } else {
    ctx.fillRect(x-2,y+20,9,4);
    ctx.fillRect(x+11,y+20,9,4);
  }
  ctx.globalAlpha=1;
}

// в”Җв”Җ DRAW PARTICLES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x-camX,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// в”Җв”Җ IN-GAME OVERLAY (level name + progress bar + tips) в”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawOverlay(){
  // Level name pill
  const wm=curWorld||WORLDS[0];
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(6,6,200,18,4); ctx.fill();
  ctx.fillStyle=wm.color;
  ctx.font='bold 7px "Press Start 2P"';
  ctx.textAlign='left';
  ctx.fillText(LV.name,10,18);

  // Progress bar (how far through the level)
  const prog=Math.min(1,camX/(LV.width-W));
  const barW=120, barX=W-barW-8, barY=10;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(barX,barY,barW,6);
  const pg=ctx.createLinearGradient(barX,0,barX+barW,0);
  pg.addColorStop(0,wm.color);
  pg.addColorStop(1,wm.color+'88');
  ctx.fillStyle=pg;
  ctx.fillRect(barX,barY,barW*prog,6);
  // Flag icon at end
  ctx.fillStyle=wm.color+'aa';
  ctx.font='10px serif';
  ctx.textAlign='left';
  ctx.fillText('вҡ‘',barX+barW+2,barY+8);

  // World tip (fades after 4 seconds)
  if(frame<240){
    const alpha=Math.min(1,(240-frame)/60);
    const tips={sea:'FLOATY JUMP вҖ” time it carefully',space:'LOW GRAVITY вҖ” hang time is longer',mine:'WATCH the ceiling for bats!',land:''};
    if(tips[LV.wt]){
      ctx.globalAlpha=alpha*0.55;
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.fillRect(0,H-24,W,24);
      ctx.fillStyle='#fff';
      ctx.font='7px "Press Start 2P"';
      ctx.textAlign='center';
      ctx.fillText(tips[LV.wt],W/2,H-10);
      ctx.globalAlpha=1;
    }
  }
  ctx.textAlign='left';
}

// в”Җв”Җ MAIN RENDER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function render(){
  ctx.clearRect(0,0,W,H);

  if(gameState==='worldSelect'){
    drawWorldSelect();
    drawFlash();
    drawCRT();
    return;
  }

  const shaking=applyShake();
  drawBG();
  for(const p of LV.sol)    drawSolid(p);
  for(const p of movPlats)  drawMovPlat(p);
  for(const s of(LV.spk||[]))  drawSpike(s);
  for(const lv of(LV.lv||[])) drawLava(lv);
  for(const t of(LV.tr||[]))  drawTramp(t);
  (LV.ib||[]).forEach((ib,i)=>drawInvis(ib,i));
  (LV.co||[]).forEach((c,i) =>drawCoin(c,i));
  drawGoal();
  for(const e of enSt) drawEnemy(e);
  drawPlayer();
  drawParticles();
  drawOverlay();
  if(shaking) ctx.restore();
  drawFlash();
  drawCRT();
}

// в”Җв”Җ CRT SCANLINES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function drawCRT(){
  // Subtle scanlines
  ctx.fillStyle='rgba(0,0,0,0.06)';
  for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);
  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.28,W/2,H/2,H*0.85);
  vg.addColorStop(0,'transparent');
  vg.addColorStop(1,'rgba(0,0,0,0.38)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

// в”Җв”Җ GAME LOOP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function gameLoop(){
  frame++;

  if(gameState==='playing'){
    updMovPlats();
    updPlayer();
    updEnemies();
    updParticles();
  } else {
    updParticles();
  }

  render();
  mouseClicked=false; // reset after render so world select can read it
  requestAnimationFrame(gameLoop);
}

// в”Җв”Җ BOOT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
goWorldSelect();
requestAnimationFrame(gameLoop);
</script>
