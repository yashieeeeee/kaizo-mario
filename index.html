<title>Kaizo Mario - World Adventure</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;width:100vw;height:100vh;overflow:hidden;font-family:'Courier New',monospace;flex-direction:column}
#hud{width:640px;max-width:100%;background:#111;border:2px solid #333;display:flex;justify-content:space-between;align-items:center;padding:4px 10px;color:#fff;font-size:10px;font-weight:bold;letter-spacing:1px;}
#hud span{color:#ffdd00}
canvas{display:block;border:3px solid #444;}
#screen{position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:none;gap:10px;z-index:100;}
#bigMsg{font-family:'Press Start 2P',monospace;font-size:28px;color:#fff;text-shadow:4px 4px 0 #ff0000,8px 8px 0 #880000;letter-spacing:3px;text-align:center;padding:0 20px;animation:glitch 0.4s infinite;}
#subMsg{font-family:'Press Start 2P',monospace;font-size:10px;color:#ffdd00;text-shadow:2px 2px 0 #885500;letter-spacing:2px;text-align:center;padding:0 20px;margin-top:6px;}
#restartBtn{pointer-events:all;font-family:'Press Start 2P',monospace;padding:12px 32px;background:#000;color:#00ff88;border:3px solid #00ff88;font-size:11px;cursor:pointer;letter-spacing:2px;margin-top:10px;text-shadow:0 0 10px #00ff88;transition:all 0.1s;}
#restartBtn:hover{background:#00ff88;color:#000;}
#menuBtn{pointer-events:all;font-family:'Press Start 2P',monospace;padding:9px 22px;background:#000;color:#ffdd00;border:2px solid #ffdd00;font-size:9px;cursor:pointer;letter-spacing:2px;margin-top:6px;transition:all 0.1s;}
#menuBtn:hover{background:#ffdd00;color:#000;}
@keyframes glitch{0%{text-shadow:4px 4px 0 #ff0000,8px 8px 0 #880000}50%{text-shadow:4px -4px 0 #0044ff,-8px 8px 0 #880000}100%{text-shadow:4px 4px 0 #ff0000,8px 8px 0 #880000}}
#controls{color:#444;font-size:9px;margin-top:4px;letter-spacing:1px;text-align:center;width:640px;max-width:100%}
#touchpad{display:none;width:640px;max-width:100%;background:#111;border-top:1px solid #222;padding:8px;justify-content:space-between;align-items:center}
@media(max-width:700px){#touchpad{display:flex}}
.tbtn{background:#222;border:2px solid #444;color:#fff;font-size:20px;width:56px;height:56px;border-radius:8px;cursor:pointer;user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center}
.tbtn:active{background:#444}
#rotateMsg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;flex-direction:column;justify-content:center;align-items:center;color:#fff;font-size:22px;font-weight:bold;text-align:center;gap:16px;}
@media(orientation:portrait) and (max-width:600px){#rotateMsg{display:flex}}
</style>

function resizeCanvas(){
  const ratio=640/400,winW=window.innerWidth,winH=window.innerHeight-50;
  let w=Math.min(winW,640),h=w/ratio;
  if(h>winH){h=winH;w=h*ratio;}
  cv.style.width=w+'px';cv.style.height=h+'px';
}
window.addEventListener('resize',resizeCanvas);resizeCanvas();

let mouseX=0,mouseY=0,mouseClicked=false;
function getCanvasPos(cx,cy){const r=cv.getBoundingClientRect();return{x:(cx-r.left)*(W/r.width),y:(cy-r.top)*(H/r.height)};}
cv.addEventListener('mousemove',e=>{const p=getCanvasPos(e.clientX,e.clientY);mouseX=p.x;mouseY=p.y;});
cv.addEventListener('click',e=>{const p=getCanvasPos(e.clientX,e.clientY);mouseX=p.x;mouseY=p.y;mouseClicked=true;});
cv.addEventListener('touchend',e=>{const t=e.changedTouches[0];const p=getCanvasPos(t.clientX,t.clientY);mouseX=p.x;mouseY=p.y;mouseClicked=true;e.preventDefault();},{passive:false});

let tL=false,tR=false,tJump=false,tJumpFresh=false;
function tb(id,fn){const el=document.getElementById(id);el.addEventListener('touchstart',e=>{e.preventDefault();fn(true);},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();fn(false);},{passive:false});}
tb('tL',v=>{tL=v;});tb('tR',v=>{tR=v;});tb('tJ',v=>{tJump=v;if(v)tJumpFresh=true;});

const K={};let jumpFresh=false;
document.addEventListener('keydown',e=>{
  K[e.key]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp',' ','z','Z','r','R','Escape'].includes(e.key))e.preventDefault();
  if((e.key==='ArrowUp'||e.key===' '||e.key==='z'||e.key==='Z')&&!K._jdown){K._jdown=true;jumpFresh=true;}
  if(e.key==='r'||e.key==='R')onRestart();
  if(e.key==='Escape')goWorldSelect();
});
document.addEventListener('keyup',e=>{K[e.key]=false;if(e.key==='ArrowUp'||e.key===' '||e.key==='z'||e.key==='Z')K._jdown=false;});

const MAXFALL=15,SPD=3.4;

function initLevel(i){
  lvlIdx=i; LV=LEVELS[i];
  curWorld=WORLDS_META.find(w=>i>=w.lr[0]&&i<=w.lr[1]);
  hW.textContent=curWorld.name;
  hLv.textContent=(i-curWorld.lr[0])+1;
  player={x:LV.ps.x,y:LV.ps.y,vx:0,vy:0,w:18,h:22,onGround:false,jumpHeld:false,dead:false,deadTimer:0};
  camX=0; frame=0; timer=300; timerTick=0; particles=[];
  movPlats=LV.mp.map(p=>({...p}));
  coinSt=(LV.co||[]).map(()=>false);
  invSt=(LV.ib||[]).map(()=>false);
  enSt=(LV.en||[]).map(e=>({...e,alive:true}));
  gameState='playing';
  bigMsg.textContent=''; subMsg.textContent='';
  restartBtn.style.display='none'; menuBtn.style.display='none';
  jumpFresh=false; K._jdown=false; tJumpFresh=false;
  hT.textContent=timer;
}

function goWorldSelect(){
  gameState='worldSelect';
  bigMsg.textContent=''; subMsg.textContent='';
  restartBtn.style.display='none'; menuBtn.style.display='none';
  hW.textContent='--'; hLv.textContent='-'; hT.textContent='---';
}

function onRestart(){ initLevel(lvlIdx); }
function startWorld(wi){ curWorld=WORLDS_META[wi]; initLevel(curWorld.lr[0]); }

// ── PHYSICS HELPERS ──────────────────────────────────────────
function allSolids(){ return [...LV.sol,...movPlats]; }
function overlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function spawnP(x,y,col,n){
  for(let i=0;i<n;i++)
    particles.push({x,y,vx:(Math.random()-.5)*5,vy:Math.random()*-5-2,life:30,col,r:Math.random()*4+2});
}
function updParticles(){
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.3;p.life--;return p.life>0;});
}

// ── ENEMIES ──────────────────────────────────────────────────
function updEnemies(){
  for(const e of enSt){
    if(!e.alive) continue;
    e.x+=e.vx;
    if(e.x<=e.mn||e.x>=e.mx) e.vx*=-1;
    if(!player.dead){
      if(overlap(player.x,player.y,player.w,player.h,e.x,e.y,22,20)){
        if(player.vy>0&&player.y+player.h<e.y+10){
          e.alive=false; player.vy=-7;
          spawnP(e.x+9,e.y+10,'#c84000',8);
          totalCoins++; hC.textContent=totalCoins;
        } else { die(); }
      }
    }
  }
}

// ── MOVING PLATFORMS ─────────────────────────────────────────
function updMovPlats(){
  for(const p of movPlats){
    if(p.dx!==undefined){ p.x+=p.dx; if(p.x<p.mn||p.x+p.w>p.mx) p.dx*=-1; }
    if(p.dy!==undefined){ p.y+=p.dy; if(p.y<p.mn||p.y>p.mx) p.dy*=-1; }
  }
}

// ── DIE ──────────────────────────────────────────────────────
function die(){
  if(player.dead) return;
  player.dead=true; player.deadTimer=55;
  player.vy=-10; player.vx=(Math.random()-.5)*4;
  spawnP(player.x+9,player.y+11,'#ff4444',12);
  deaths++; hD.textContent=deaths;
}

// ── PLAYER UPDATE ────────────────────────────────────────────
function updPlayer(){
  if(player.dead){
    player.deadTimer--;
    player.vy+=LV.grav; player.x+=player.vx; player.y+=player.vy;
    if(player.deadTimer<=0){
      const msgs=[['DELETED!','Classic.'],['YOU DIED','Again.'],['SKILL ISSUE','Try harder.'],
        ['NICE TRY','Not.'],['L + RATIO','You fell.'],['ARE YOU OK?',deaths+' deaths...'],
        ["KAIZO'D!",'Expected.'],['GOD LEFT','Deaths: '+deaths],['NO MERCY','Deaths: '+deaths]];
      const m=msgs[Math.min(Math.floor(deaths/2),msgs.length-1)];
      bigMsg.textContent=m[0]; subMsg.textContent=m[1];
      restartBtn.style.display='inline-block';
      menuBtn.style.display='inline-block';
      gameState='dead';
    }
    return;
  }

  timerTick++;
  if(timerTick>=60){ timerTick=0; timer--; hT.textContent=timer; if(timer<=0) die(); }

  const jk=K['ArrowUp']||K[' ']||K['z']||K['Z']||tJump;
  const fresh=jumpFresh||tJumpFresh;
  jumpFresh=false; tJumpFresh=false;

  player.vx=0;
  if(K['ArrowLeft']||K['a']||tL) player.vx=-SPD;
  if(K['ArrowRight']||K['d']||tR) player.vx=SPD;

  if(fresh&&player.onGround){ player.vy=LV.jf; player.jumpHeld=true; }
  if(player.jumpHeld&&jk&&player.vy<0) player.vy+=-0.5;
  if(!jk) player.jumpHeld=false;

  player.vy+=LV.grav;
  if(player.vy>MAXFALL) player.vy=MAXFALL;

  // X movement + horizontal collision
  player.x+=player.vx;
  if(player.x<0) player.x=0;
  if(player.x+player.w>LV.width) player.x=LV.width-player.w;
  for(const p of allSolids()){
    if(overlap(player.x,player.y,player.w,player.h,p.x,p.y,p.w,p.h)){
      if(player.vx>0) player.x=p.x-player.w;
      else if(player.vx<0) player.x=p.x+p.w;
      player.vx=0;
    }
  }

  // Invisible blocks (hit from below)
  for(let i=0;i<invSt.length;i++){
    if(invSt[i]) continue;
    const ib=LV.ib[i];
    if(player.vy<0&&player.x+player.w>ib.x&&player.x<ib.x+ib.w&&
       player.y+player.vy<=ib.y+ib.h&&player.y>ib.y){
      invSt[i]=true; player.vy=5; spawnP(ib.x+10,ib.y,'#FFD700',6);
    }
  }

  player.onGround=false;
  player.y+=player.vy;

  // Trampolines
  for(const t of(LV.tr||[])){
    if(player.vy>0&&overlap(player.x,player.y,player.w,player.h,t.x,t.y,t.w,t.h)&&
       player.y+player.h-player.vy<=t.y+4){
      player.y=t.y-player.h; player.vy=LV.jf*1.45; player.onGround=true;
    }
  }

  // Y collision with solids
  for(const p of allSolids()){
    if(overlap(player.x,player.y,player.w,player.h,p.x,p.y,p.w,p.h)){
      if(player.vy>0&&player.y+player.h-player.vy<=p.y+4){
        player.y=p.y-player.h; player.vy=0; player.onGround=true;
        if(p.dx!==undefined) player.x+=p.dx;
      } else if(player.vy<0){ player.y=p.y+p.h; player.vy=2; }
    }
  }

  // Spikes
  for(const s of(LV.spk||[])){
    const sy=s.f==='u'?(s.y||350):(s.y||0);
    if(overlap(player.x+2,player.y+4,player.w-4,player.h-4,s.x,sy,s.w,12)) die();
  }

  // Lava / hazard liquid
  for(const lv of(LV.lv||[])){ if(overlap(player.x,player.y,player.w,player.h,lv.x,lv.y,lv.w,lv.h)) die(); }

  // Fall off screen
  if(player.y>H+120) die();

  // Coins
  (LV.co||[]).forEach((c,i)=>{
    if(!coinSt[i]&&overlap(player.x,player.y,player.w,player.h,c.x-8,c.y-8,16,16)){
      coinSt[i]=true; totalCoins++; hC.textContent=totalCoins; spawnP(c.x,c.y,'#FFD700',5);
    }
  });

  // Goal flag
  if(overlap(player.x,player.y,player.w,player.h,LV.gx,LV.gy,30,H-LV.gy)){
    if(lvlIdx<curWorld.lr[1]){
      bigMsg.textContent='LEVEL CLEAR!';
      subMsg.textContent='Next: '+LEVELS[lvlIdx+1].name;
      gameState='win';
      setTimeout(()=>initLevel(lvlIdx+1),2000);
    } else {
      bigMsg.textContent=curWorld.name+' CLEAR!';
      subMsg.textContent='★ LEGENDARY ★  Deaths: '+deaths;
      menuBtn.style.display='inline-block';
      gameState='worldClear';
    }
  }

  camX=Math.max(0,Math.min(LV.width-W,player.x-W/3));
}

// ── WORLD SELECT CARDS ───────────────────────────────────────
const CARDS=[
  {x:30, y:68, w:272,h:148,wi:0},
  {x:338,y:68, w:272,h:148,wi:1},
  {x:30, y:232,w:272,h:148,wi:2},
  {x:338,y:232,w:272,h:148,wi:3},
];

function drawWorldSelect(){
  // Background
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#000018'); g.addColorStop(1,'#000028');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Stars
  for(let i=0;i<80;i++){
    const sx=(i*139+50)%W, sy=(i*97+20)%H;
    const blink=Math.sin(frame*.05+i)>.5;
    ctx.fillStyle=blink?'rgba(255,255,255,.9)':'rgba(180,180,255,.25)';
    ctx.fillRect(sx,sy,blink?2:1,blink?2:1);
  }

  // Title
  ctx.textAlign='center';
  const tg=ctx.createLinearGradient(0,0,W,0);
  tg.addColorStop(0,'#ff4400'); tg.addColorStop(.5,'#ffdd00'); tg.addColorStop(1,'#ff4400');
  ctx.fillStyle=tg; ctx.font='18px "Press Start 2P"';
  ctx.shadowColor='#ff8800'; ctx.shadowBlur=12;
  ctx.fillText('KAIZO WORLD',W/2,34);
  ctx.shadowBlur=0;
  ctx.fillStyle='#444'; ctx.font='7px "Press Start 2P"';
  ctx.fillText('SELECT YOUR DOOM',W/2,50);

  // Cards
  for(const card of CARDS){
    const wm=WORLDS_META[card.wi];
    const hov=mouseX>=card.x&&mouseX<=card.x+card.w&&mouseY>=card.y&&mouseY<=card.y+card.h;

    // Card bg
    ctx.fillStyle=hov?wm.dark:'#080808';
    ctx.fillRect(card.x,card.y,card.w,card.h);

    // Border glow
    ctx.strokeStyle=hov?wm.color:'#222';
    ctx.lineWidth=hov?2.5:1;
    if(hov){ctx.shadowColor=wm.color;ctx.shadowBlur=12;}
    ctx.strokeRect(card.x,card.y,card.w,card.h);
    ctx.shadowBlur=0;

    // Top colour strip
    ctx.fillStyle=wm.color+'22';
    ctx.fillRect(card.x,card.y,card.w,26);
    ctx.fillStyle=wm.color;
    ctx.fillRect(card.x,card.y,card.w,3);

    // Emoji
    ctx.font='26px serif'; ctx.textAlign='left';
    ctx.fillText(wm.emoji,card.x+10,card.y+42);

    // Name
    ctx.fillStyle=wm.color; ctx.font='9px "Press Start 2P"';
    ctx.shadowColor=hov?wm.color:'transparent'; ctx.shadowBlur=hov?6:0;
    ctx.fillText(wm.name,card.x+10,card.y+68);
    ctx.shadowBlur=0;

    // Subtitle
    ctx.fillStyle='#444'; ctx.font='6px "Press Start 2P"';
    ctx.fillText(wm.subtitle,card.x+10,card.y+84);

    // 2 levels badge
    ctx.fillStyle='#333'; ctx.font='6px "Press Start 2P"';
    ctx.fillText('2 LEVELS',card.x+10,card.y+100);

    // Difficulty stars
    ctx.fillStyle='#ffaa00'; ctx.font='10px "Press Start 2P"';
    ctx.fillText(wm.diff,card.x+10,card.y+118);

    // Enter hint
    if(hov){
      ctx.fillStyle=wm.color; ctx.font='7px "Press Start 2P"'; ctx.textAlign='right';
      ctx.fillText('▶ ENTER',card.x+card.w-8,card.y+card.h-8);
    }
    ctx.textAlign='left';
  }

  // Footer stats
  ctx.fillStyle='#2a2a2a'; ctx.font='7px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText('TOTAL DEATHS: '+deaths+'   COINS: '+totalCoins,W/2,H-8);
  ctx.textAlign='left';

  // Click handling
  if(mouseClicked){
    for(const card of CARDS){
      if(mouseX>=card.x&&mouseX<=card.x+card.w&&mouseY>=card.y&&mouseY<=card.y+card.h){
        startWorld(card.wi);
      }
    }
    mouseClicked=false;
  }
}

// ── DRAW BACKGROUND ──────────────────────────────────────────
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,LV.bg[0]); g.addColorStop(1,LV.bg[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  if(LV.wt==='land'){
    ctx.fillStyle='#ffffffcc';
    for(const c of [{x:80,y:55,r:22},{x:220,y:40,r:16},{x:400,y:60,r:26},{x:560,y:45,r:20}]){
      const cx=(c.x-(camX*.2)+LV.width)%(W+120)-60;
      ctx.beginPath();
      ctx.arc(cx,c.y,c.r,0,Math.PI*2);
      ctx.arc(cx+c.r,c.y-7,c.r*.7,0,Math.PI*2);
      ctx.arc(cx+c.r*1.7,c.y,c.r*.55,0,Math.PI*2);
      ctx.fill();
    }
  }

  if(LV.wt==='sea'){
    // Floating bubbles
    for(let i=0;i<30;i++){
      const bx=((i*137+(frame*.4|0))%(W+40))-20;
      const by=((i*97+frame*.7)%H);
      ctx.fillStyle=`rgba(100,200,255,${.07+i%3*.03})`;
      ctx.beginPath(); ctx.arc(bx,by,(i%3)+1.5,0,Math.PI*2); ctx.fill();
    }
    // Light shafts
    ctx.fillStyle='rgba(80,180,255,0.02)';
    for(let i=0;i<4;i++){
      const rx=(i*180-(camX*.05)+LV.width)%W;
      ctx.beginPath(); ctx.moveTo(rx,0); ctx.lineTo(rx-25,H); ctx.lineTo(rx+25,H); ctx.lineTo(rx+50,0); ctx.fill();
    }
  }

  if(LV.wt==='mine'){
    // Dust particles
    for(let i=0;i<50;i++){
      const rx=((i*137-camX*.3+LV.width)%W), ry=(i*97)%H;
      ctx.fillStyle='rgba(80,50,10,.1)';
      ctx.fillRect(rx,ry,(i%3)+1,(i%3)+1);
    }
    // Lantern glows
    for(let i=0;i<5;i++){
      const lx=((i*800-camX+LV.width)%LV.width)-camX;
      if(lx>-80&&lx<W+80){
        const lg=ctx.createRadialGradient(lx,300,0,lx,300,80);
        lg.addColorStop(0,'rgba(255,160,0,.1)'); lg.addColorStop(1,'transparent');
        ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(lx,300,80,0,Math.PI*2); ctx.fill();
      }
    }
  }

  if(LV.wt==='space'){
    // Stars blinking
    for(let i=0;i<80;i++){
      const sx=((i*139+50-camX*.08+LV.width)%(W+10));
      const sy=(i*97+20)%H;
      const b=Math.sin(frame*.04+i)>.3;
      ctx.fillStyle=`rgba(${b?'255,255,255':'160,160,255'},${b?.9:.3})`;
      ctx.fillRect(sx,sy,b?2:1,b?2:1);
    }
    // Nebula blobs
    const nb=['rgba(80,0,180,.04)','rgba(0,60,200,.04)','rgba(160,0,100,.03)'];
    for(let i=0;i<3;i++){
      const nx=((i*280+70-camX*.05)%(W+100));
      const ng=ctx.createRadialGradient(nx,i*100+60,0,nx,i*100+60,100);
      ng.addColorStop(0,nb[i]); ng.addColorStop(1,'transparent');
      ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(nx,i*100+60,100,0,Math.PI*2); ctx.fill();
    }
    // Planet
    const px=(1200-camX*.12)%W;
    if(px>-90&&px<W+90){
      ctx.fillStyle='rgba(90,50,150,.12)'; ctx.beginPath(); ctx.arc(px,75,50,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(110,70,170,.08)';
      ctx.beginPath(); ctx.ellipse(px,75,80,12,-.2,0,Math.PI*2); ctx.fill();
    }
  }
}

// ── DRAW SOLID PLATFORM ──────────────────────────────────────
function drawSolid(p){
  const x=p.x-camX;
  if(LV.wt==='land'){
    ctx.fillStyle='#5a3000'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#44aa22'; ctx.fillRect(x,p.y,p.w,6);
    ctx.fillStyle='#33881a'; ctx.fillRect(x,p.y+6,p.w,3);
  } else if(LV.wt==='sea'){
    ctx.fillStyle='#002855'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#0055aa'; ctx.fillRect(x,p.y,p.w,5);
    ctx.fillStyle='#ff6644'; ctx.fillRect(x,p.y,p.w,3);
    // Coral tufts
    if(p.w>40&&Math.floor(p.x/80)%2===0){
      ctx.fillStyle='#006600'; ctx.fillRect(x+4,p.y-8,4,10); ctx.fillRect(x+15,p.y-12,4,14);
    }
  } else if(LV.wt==='mine'){
    ctx.fillStyle='#2e1500'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#4a2800'; ctx.fillRect(x,p.y,p.w,5);
    // Gold vein flecks
    ctx.fillStyle='rgba(255,190,0,.2)';
    for(let i=0;i<p.w;i+=16) ctx.fillRect(x+i,p.y+2,5,2);
    ctx.strokeStyle='#1e0a00'; ctx.lineWidth=1; ctx.strokeRect(x,p.y,p.w,p.h);
  } else if(LV.wt==='space'){
    ctx.fillStyle='#14143a'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#24245a'; ctx.fillRect(x,p.y,p.w,4);
    // LED dots
    ctx.fillStyle='#3333aa';
    for(let i=5;i<p.w;i+=18){ ctx.beginPath(); ctx.arc(x+i,p.y+2,2,0,Math.PI*2); ctx.fill(); }
  }
}

// ── DRAW MOVING PLATFORM ─────────────────────────────────────
function drawMovPlat(p){
  const x=p.x-camX;
  const cols={land:['#883300','#cc5500'],sea:['#002d77','#0044bb'],mine:['#442200','#ddaa00'],space:['#1d0055','#5500cc']};
  const[c1,c2]=cols[LV.wt]||cols.land;
  ctx.fillStyle=c1; ctx.fillRect(x,p.y,p.w,p.h);
  ctx.fillStyle=c2; ctx.fillRect(x,p.y,p.w,4);
  ctx.strokeStyle=c2; ctx.lineWidth=1.5; ctx.strokeRect(x,p.y,p.w,p.h);
  ctx.fillStyle='#fff5'; ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText(p.dx?'↔':'↕',x+p.w/2,p.y+11); ctx.textAlign='left';
}

// ── DRAW SPIKES ──────────────────────────────────────────────
function drawSpike(s){
  const sy=s.f==='u'?(s.y||350):(s.y||0);
  const num=Math.floor(s.w/10);
  const cols={land:'#aaaacc',sea:'#ffee00',mine:'#dd7700',space:'#aa00ff'};
  ctx.fillStyle=cols[LV.wt]||'#aaaacc';
  for(let i=0;i<num;i++){
    const sx=s.x-camX+i*10;
    ctx.beginPath();
    if(s.f==='u'){ ctx.moveTo(sx,sy+12); ctx.lineTo(sx+5,sy); ctx.lineTo(sx+10,sy+12); }
    else          { ctx.moveTo(sx,sy);    ctx.lineTo(sx+5,sy+12); ctx.lineTo(sx+10,sy); }
    ctx.closePath(); ctx.fill();
  }
}

// ── DRAW LAVA / HAZARD LIQUID ────────────────────────────────
function drawLava(lv){
  const t=frame*.05, x=lv.x-camX;
  if(LV.wt==='sea'){
    // Electric sand (yellow)
    ctx.fillStyle='#776600'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#ffee00';
    for(let i=0;i<lv.w;i+=10){ const w=Math.sin(t*2+i*.4)*3; ctx.fillRect(x+i,lv.y+w,8,4); }
    ctx.fillStyle='rgba(255,220,0,.3)'; ctx.fillRect(x,lv.y,lv.w,3);
  } else if(LV.wt==='mine'){
    // Acid (green)
    ctx.fillStyle='#003300'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#00aa00';
    for(let i=0;i<lv.w;i+=12){ const w=Math.sin(t+i*.3)*3; ctx.fillRect(x+i,lv.y+w,10,5); }
    ctx.fillStyle='rgba(0,200,0,.3)'; ctx.fillRect(x,lv.y,lv.w,3);
  } else if(LV.wt==='space'){
    // Void plasma (purple)
    ctx.fillStyle='#1a0030'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#aa00ff';
    for(let i=0;i<lv.w;i+=12){ const w=Math.sin(t*3+i*.3)*3; ctx.fillRect(x+i,lv.y+w,10,5); }
    ctx.fillStyle='rgba(170,0,255,.3)'; ctx.fillRect(x,lv.y,lv.w,3);
  } else {
    // Classic lava (land)
    ctx.fillStyle='#cc2200'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#ff4400';
    for(let i=0;i<lv.w;i+=12){ const w=Math.sin(t+i*.3)*3; ctx.fillRect(x+i,lv.y+w,10,6); }
    ctx.fillStyle='rgba(255,102,0,.5)'; ctx.fillRect(x,lv.y,lv.w,4);
  }
}

// ── DRAW COINS ───────────────────────────────────────────────
function drawCoin(c,i){
  if(coinSt[i]) return;
  const t=frame*.07+i, cx=c.x-camX, cy=c.y-Math.sin(t)*3;
  const cols={land:'#FFD700',sea:'#00ffcc',mine:'#FFD700',space:'#cc88ff'};
  ctx.fillStyle=cols[LV.wt]||'#FFD700'; ctx.strokeStyle='#FFA500'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff9'; ctx.beginPath(); ctx.arc(cx-2,cy-2,3,0,Math.PI*2); ctx.fill();
}

// ── DRAW INVISIBLE BLOCK (after revealed) ───────────────────
function drawInvis(ib,i){
  if(!invSt[i]) return;
  const x=ib.x-camX;
  ctx.fillStyle='#c84000'; ctx.fillRect(x,ib.y,ib.w,ib.h);
  ctx.fillStyle='#ff8844'; ctx.fillRect(x+2,ib.y+2,ib.w-4,4);
  ctx.strokeStyle='#881500'; ctx.lineWidth=1; ctx.strokeRect(x,ib.y,ib.w,ib.h);
}

// ── DRAW TRAMPOLINE ──────────────────────────────────────────
function drawTramp(t){
  const x=t.x-camX;
  const cols={land:['#338833','#66ff66'],sea:['#004488','#0088ff'],mine:['#886600','#ffdd00'],space:['#330077','#9922ff']};
  const[c1,c2]=cols[LV.wt]||cols.land;
  ctx.fillStyle=c1; ctx.fillRect(x,t.y,t.w,t.h);
  ctx.fillStyle=c2; ctx.fillRect(x+3,t.y+2,t.w-6,4);
  ctx.strokeStyle='#0004'; ctx.lineWidth=1; ctx.strokeRect(x,t.y,t.w,t.h);
}

// ── DRAW ENEMY ───────────────────────────────────────────────
function drawEnemy(e){
  if(!e.alive) return;
  const x=e.x-camX;

  if(e.t==='goomba'){
    ctx.fillStyle='#8B4513'; ctx.fillRect(x,e.y,18,16);
    ctx.fillStyle='#f5deb3'; ctx.fillRect(x+2,e.y+2,14,8);
    ctx.fillStyle='#fff'; ctx.fillRect(x+3,e.y+3,4,4); ctx.fillRect(x+11,e.y+3,4,4);
    ctx.fillStyle='#000'; ctx.fillRect(x+(e.vx<0?4:5),e.y+4,2,2); ctx.fillRect(x+(e.vx<0?12:13),e.y+4,2,2);
    ctx.fillStyle='#333'; ctx.fillRect(x-2,e.y+16,8,4); ctx.fillRect(x+12,e.y+16,8,4);

  } else if(e.t==='koopa'){
    ctx.fillStyle='#228800'; ctx.fillRect(x,e.y,22,18);
    ctx.fillStyle='#aaff44'; ctx.fillRect(x+3,e.y+2,16,12);
    ctx.fillStyle='#ffee00'; ctx.fillRect(x+4,e.y+2,14,8);
    ctx.fillStyle='#000'; ctx.fillRect(x+(e.vx<0?5:11),e.y+4,3,3);
    ctx.fillStyle='#333'; ctx.fillRect(x,e.y+18,9,4); ctx.fillRect(x+13,e.y+18,9,4);

  } else if(e.t==='fish'){
    ctx.fillStyle='#ff6600'; ctx.fillRect(x,e.y+3,18,12);
    ctx.fillStyle='#ff9944'; ctx.fillRect(x+2,e.y+3,14,8);
    ctx.fillStyle='#fff'; ctx.fillRect(x+3,e.y+5,4,4);
    ctx.fillStyle='#000'; ctx.fillRect(x+4,e.y+6,2,2);
    ctx.fillStyle='#ff6600';
    if(e.vx<0){ ctx.beginPath(); ctx.moveTo(x+18,e.y+3); ctx.lineTo(x+26,e.y); ctx.lineTo(x+26,e.y+18); ctx.fill(); }
    else       { ctx.beginPath(); ctx.moveTo(x,e.y+3); ctx.lineTo(x-8,e.y); ctx.lineTo(x-8,e.y+18); ctx.fill(); }
    ctx.fillStyle='#ff4400'; ctx.fillRect(x+5,e.y,8,4);

  } else if(e.t==='eel'){
    ctx.fillStyle='#888800'; ctx.fillRect(x,e.y+2,24,10);
    ctx.fillStyle='#dddd00'; ctx.fillRect(x+2,e.y+3,20,6);
    ctx.fillStyle='#000'; ctx.fillRect(x+(e.vx<0?3:16),e.y+4,3,3);
    if(frame%10<5){ ctx.fillStyle='rgba(255,255,100,.3)'; ctx.fillRect(x-3,e.y,30,15); }

  } else if(e.t==='bat'){
    ctx.fillStyle='#330044'; ctx.fillRect(x+3,e.y+4,12,10);
    ctx.fillStyle='#ff00cc'; ctx.fillRect(x+5,e.y+5,4,4); ctx.fillRect(x+9,e.y+5,4,4);
    ctx.fillStyle='#000'; ctx.fillRect(x+6,e.y+6,2,2); ctx.fillRect(x+10,e.y+6,2,2);
    const wu=Math.sin(frame*.28)>0;
    ctx.fillStyle='#1a0022';
    if(wu){
      ctx.beginPath(); ctx.moveTo(x+3,e.y+6); ctx.lineTo(x-9,e.y+2); ctx.lineTo(x+1,e.y+12); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x+15,e.y+6); ctx.lineTo(x+27,e.y+2); ctx.lineTo(x+17,e.y+12); ctx.fill();
    } else {
      ctx.beginPath(); ctx.moveTo(x+3,e.y+6); ctx.lineTo(x-9,e.y+14); ctx.lineTo(x+1,e.y+12); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x+15,e.y+6); ctx.lineTo(x+27,e.y+14); ctx.lineTo(x+17,e.y+12); ctx.fill();
    }

  } else if(e.t==='alien'){
    ctx.fillStyle='#003a00'; ctx.fillRect(x,e.y+4,20,14);
    ctx.fillStyle='#009900'; ctx.fillRect(x+3,e.y+2,14,16);
    ctx.fillStyle='#00ee00'; ctx.fillRect(x+5,e.y+3,10,8);
    ctx.fillStyle='#fff'; ctx.fillRect(x+5,e.y+4,5,5); ctx.fillRect(x+11,e.y+4,5,5);
    ctx.fillStyle='#ff0000'; ctx.fillRect(x+6,e.y+5,3,3); ctx.fillRect(x+12,e.y+5,3,3);
    // Antennae
    ctx.fillStyle='#00ee00';
    ctx.fillRect(x+7,e.y,2,4); ctx.fillRect(x+13,e.y,2,4);
    ctx.beginPath(); ctx.arc(x+8,e.y,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+14,e.y,3,0,Math.PI*2); ctx.fill();
  }
}

// ── DRAW GOAL FLAG ───────────────────────────────────────────
function drawGoal(){
  const x=LV.gx-camX, y=LV.gy;
  const pc={land:'#888',sea:'#00bbff',mine:'#ffaa00',space:'#8800ff'};
  const fc={land:'#ff3333',sea:'#ffff00',mine:'#ff8800',space:'#00ffff'};
  ctx.fillStyle=pc[LV.wt]||'#888'; ctx.fillRect(x+12,y,6,H-y);
  const wave=Math.sin(frame*.06)*6;
  ctx.fillStyle=fc[LV.wt]||'#ff3333';
  ctx.beginPath(); ctx.moveTo(x+18,y+4); ctx.lineTo(x+44+wave,y+14); ctx.lineTo(x+18,y+26); ctx.fill();
  ctx.fillStyle='#FFD700'; ctx.font='16px monospace';
  ctx.fillText('★',x+4,y-5+Math.sin(frame*.04)*3);
}

// ── DRAW PLAYER ──────────────────────────────────────────────
function drawPlayer(){
  if(!player.dead&&player.y>H+50) return;
  const x=player.x-camX, y=player.y;
  ctx.globalAlpha=player.dead?.5:1;
  // Shadow
  if(player.onGround){
    ctx.fillStyle='rgba(0,0,0,.2)';
    ctx.beginPath(); ctx.ellipse(x+9,y+player.h+1,10,3,0,0,Math.PI*2); ctx.fill();
  }
  // Hat
  ctx.fillStyle='#cc0000'; ctx.fillRect(x,y,18,7); ctx.fillRect(x-2,y+5,22,4);
  // Face
  ctx.fillStyle='#ffcc99'; ctx.fillRect(x,y+8,18,9);
  // Moustache
  ctx.fillStyle='#442200'; ctx.fillRect(x+2,y+14,14,3);
  // Eyes
  ctx.fillStyle='#222'; ctx.fillRect(x+3,y+9,3,3); ctx.fillRect(x+11,y+9,3,3);
  ctx.fillStyle='#fff'; ctx.fillRect(x+4,y+9,2,2); ctx.fillRect(x+12,y+9,2,2);
  // Overalls
  ctx.fillStyle='#0033cc'; ctx.fillRect(x,y+17,18,5);
  ctx.fillStyle='#cc0000'; ctx.fillRect(x,y+17,6,4); ctx.fillRect(x+12,y+17,6,4);
  // Feet (animated)
  ctx.fillStyle='#331100';
  if(player.vx!==0){
    const f=Math.floor(frame/8)%2;
    ctx.fillRect(x+(f?5:-2),y+20,9,4); ctx.fillRect(x+(f?9:11),y+20,9,4);
  } else {
    ctx.fillRect(x-2,y+20,9,4); ctx.fillRect(x+11,y+20,9,4);
  }
  ctx.globalAlpha=1;
}

// ── DRAW PARTICLES ───────────────────────────────────────────
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x-camX,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── HUD OVERLAY (level name + world hint) ────────────────────
function drawOverlay(){
  ctx.fillStyle='rgba(255,255,255,.15)'; ctx.font='bold 9px Courier New'; ctx.textAlign='left';
  ctx.fillText(LV.name,8,16);
  const hints={sea:'UNDERWATER — FLOATY JUMP',space:'LOW GRAVITY — LONG HANG TIME',mine:'BATS! Watch the ceiling.',land:''};
  if(hints[LV.wt]){
    ctx.fillStyle='rgba(200,200,255,.15)'; ctx.font='7px Courier New';
    ctx.fillText(hints[LV.wt],8,28);
  }
}

// ── MAIN RENDER ──────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,W,H);
  if(gameState==='worldSelect'){ drawWorldSelect(); return; }

  drawBG();
  for(const p of LV.sol)   drawSolid(p);
  for(const p of movPlats) drawMovPlat(p);
  for(const s of(LV.spk||[])) drawSpike(s);
  for(const lv of(LV.lv||[])) drawLava(lv);
  for(const t of(LV.tr||[])) drawTramp(t);
  (LV.ib||[]).forEach((ib,i)=>drawInvis(ib,i));
  (LV.co||[]).forEach((c,i)=>drawCoin(c,i));
  drawGoal();
  for(const e of enSt) drawEnemy(e);
  drawPlayer();
  drawParticles();
  drawOverlay();
}

// ── GAME LOOP ────────────────────────────────────────────────
function loop(){
  frame++;
  mouseClicked=false; // reset at start of frame; drawWorldSelect sets it before reset if needed
  if(gameState==='playing'){
    updMovPlats(); updPlayer(); updEnemies(); updParticles();
  } else {
    updParticles();
  }
  render();
  // Re-allow click detection: worldSelect reads it inside render, so reset AFTER render
  requestAnimationFrame(loop);
}

// Fix: reset mouseClicked AFTER render so worldSelect can read it
// Override loop to correct order
(function(){
  function gameLoop(){
    frame++;
    if(gameState==='playing'){
      updMovPlats(); updPlayer(); updEnemies(); updParticles();
    } else {
      updParticles();
    }
    render();
    mouseClicked=false;
    requestAnimationFrame(gameLoop);
  }
  initLevel(0); // preload level data silently
  goWorldSelect(); // start on world select
  requestAnimationFrame(gameLoop);
})();
</script>
