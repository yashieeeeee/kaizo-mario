<title>Kaizo Mario</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden}
#wrap{display:flex;flex-direction:column;align-items:center;width:100vw;height:100vh;padding:0;justify-content:center;}
#hud{width:640px;max-width:100%;background:#111;border:2px solid #333;display:flex;justify-content:space-between;align-items:center;padding:5px 14px;color:#fff;font-size:13px;font-weight:bold;letter-spacing:1px}
#hud span{color:#ffdd00}
canvas{display:block;border:3px solid #444;}
#overlay{position:relative;display:flex;justify-content:center;align-items:center;}
#screen{position:fixed;top:0;left:0;width:100vw;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:none;gap:12px;z-index:100;}
#bigMsg{font-size:48px;font-weight:900;color:#ff4444;text-shadow:0 0 30px #ff0000,0 0 60px #ff000088;letter-spacing:5px;text-align:center;padding:0 20px;font-family:'Courier New',monospace;}
#subMsg{font-size:18px;color:#ffaa00;letter-spacing:3px;text-align:center;padding:0 20px;text-shadow:0 0 10px #ff880088;}
#restartBtn{pointer-events:all;padding:14px 48px;background:#000;color:#ff4444;border:2px solid #ff4444;font-size:18px;font-weight:bold;cursor:pointer;letter-spacing:3px;margin-top:8px;font-family:'Courier New',monospace;text-shadow:0 0 10px #ff4444;}
#restartBtn:hover{background:#ff4444;color:#000;box-shadow:0 0 20px #ff4444;}
#controls{color:#555;font-size:11px;margin-top:5px;letter-spacing:1px;text-align:center}
#touchpad{display:none;width:640px;max-width:100%;background:#111;border-top:1px solid #222;padding:8px;justify-content:space-between;align-items:center}
@media(max-width:700px){#touchpad{display:flex}}
.tbtn{background:#222;border:2px solid #444;color:#fff;font-size:20px;width:56px;height:56px;border-radius:8px;cursor:pointer;user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center;font-family:monospace}
.tbtn:active{background:#444}
#tBtns{display:flex;gap:8px}
#rotateMsg{
  display:none;
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#000;z-index:9999;
  flex-direction:column;justify-content:center;align-items:center;
  color:#fff;font-size:22px;font-weight:bold;letter-spacing:2px;text-align:center;gap:16px;
}
#rotateMsg div{font-size:60px;animation:spin 2s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg)}50%{transform:rotate(90deg)}100%{transform:rotate(90deg)}}
@media(orientation:portrait){#rotateMsg{display:flex;}}

<script>
function resizeCanvas(){
  const ratio=640/400;
  const winW=window.innerWidth;
  const winH=window.innerHeight;
  let w=winW,h=winW/ratio;
  if(h>winH){h=winH;w=winH*ratio;}
  cv.style.width=w+'px';
  cv.style.height=h+'px';
  const overlay=document.getElementById('overlay');
  overlay.style.width=w+'px';
  overlay.style.height=h+'px';
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();
</script>

let lvlIdx=0,LV,player,movPlatforms,coinStates,invStates,enemyStates,particles2;

function initLevel(i){
  lvlIdx=i; LV=LEVELS[i];
  hLv.textContent=i+1;
  player={
    x:LV.playerStart.x,y:LV.playerStart.y,
    vx:0,vy:0,w:18,h:22,
    onGround:false,jumpHeld:false,dead:false,deadTimer:0,
    bouncing:false
  };
  camX=0; frame=0; timer=300; timerTick=0;
  particles=[]; particles2=[];
  movPlatforms=LV.movingPlatforms.map(p=>({...p}));
  coinStates=(LV.coins||[]).map(()=>false);
  invStates=(LV.invisBlocks||[]).map(()=>false);
  enemyStates=(LV.enemies||[]).map(e=>({...e,alive:true}));
  gameState='playing';
  bigMsg.textContent=''; subMsg.textContent='';
  restartBtn.style.display='none';
  jumpFresh=false; jumpHeld=false; K._jdown=false;
  tJumpFresh=false;
}

function onRestart(){initLevel(lvlIdx);}

const GRAV=0.52,JF=-12.5,JH=-0.5,MAXFALL=15,SPD=3.4;

function allSolids(){return[...LV.solids,...movPlatforms];}

function overlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

function spawnParticle(x,y,col,n){
  for(let i=0;i<n;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*5,vy:Math.random()*-5-2,life:30,col,r:Math.random()*4+2});
  }
}

function updateParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.life--;
    return p.life>0;
  });
}

function updateEnemies(){
  for(const e of enemyStates){
    if(!e.alive)continue;
    e.x+=e.vx;
    if(e.x<=e.minX||e.x>=e.maxX)e.vx*=-1;
    if(!player.dead){
      const ew=e.type==='koopa'?22:18,eh=20;
      if(overlap(player.x,player.y,player.w,player.h,e.x,e.y,ew,eh)){
        if(player.vy>0&&player.y+player.h<e.y+10){
          e.alive=false;
          player.vy=-7;
          spawnParticle(e.x+9,e.y+10,'#c84000',8);
          totalCoins+=1; hC.textContent=totalCoins;
        } else {
          die();
        }
      }
    }
  }
}

function updateMovPlats(){
  for(const p of movPlatforms){
    if(p.dx!==undefined){
      p.x+=p.dx;
      if(p.x<p.minX||p.x+p.w>p.maxX)p.dx*=-1;
    }
    if(p.dy!==undefined){
      p.y+=p.dy;
      if(p.y<p.minY||p.y>p.maxY)p.dy*=-1;
    }
  }
}

function die(){
  if(player.dead)return;
  player.dead=true; player.deadTimer=55;
  player.vy=-10; player.vx=(Math.random()-0.5)*4;
  spawnParticle(player.x+9,player.y+11,'#ff4444',12);
  deaths++; hD.textContent=deaths;
}

function updatePlayer(){
  if(player.dead){
    player.deadTimer--;
    player.vy+=GRAV; player.x+=player.vx; player.y+=player.vy;
    if(player.deadTimer<=0){
      const msgs=[
        ['KAIZO\'D!','Classic.'],
        ['YOU DIED','Again.'],
        ['SKILL ISSUE','Try harder.'],
        ['NICE TRY','Not.'],
        ['L + RATIO','You fell.'],
        ['TOUCH GRASS?','After one more try.'],
        ['THIS IS FINE','(It\'s not fine)'],
        ['IMAGINE','Imagine getting past this'],
        ['CERTIFIED SKILL ISSUE','Deaths: '+deaths],
        ['ARE YOU OK?','That\'s '+deaths+' deaths...'],
      ];
      const m=msgs[Math.min(Math.floor(deaths/2),msgs.length-1)];
      bigMsg.textContent=m[0]; subMsg.textContent=m[1];
      restartBtn.style.display='inline-block';
      gameState='dead';
    }
    return;
  }

  timerTick++;
  if(timerTick>=60){timerTick=0;timer--;hT.textContent=timer;if(timer<=0)die();}

  const jk=K['ArrowUp']||K[' ']||K['z']||K['Z']||tJump;
  const fresh=jumpFresh||tJumpFresh;
  jumpFresh=false; tJumpFresh=false;

  player.vx=0;
  if(K['ArrowLeft']||K['a']||tL)player.vx=-SPD;
  if(K['ArrowRight']||K['d']||tR)player.vx=SPD;

  if(fresh&&player.onGround){player.vy=JF;player.jumpHeld=true;}
  if(player.jumpHeld&&jk&&player.vy<0)player.vy+=JH;
  if(!jk)player.jumpHeld=false;

  player.vy+=GRAV;
  if(player.vy>MAXFALL)player.vy=MAXFALL;

  player.x+=player.vx;
  if(player.x<0)player.x=0;
  if(player.x+player.w>LV.width)player.x=LV.width-player.w;
  for(const p of allSolids()){
    if(overlap(player.x,player.y,player.w,player.h,p.x,p.y,p.w,p.h)){
      if(player.vx>0)player.x=p.x-player.w;
      else if(player.vx<0)player.x=p.x+p.w;
      player.vx=0;
    }
  }

  for(let i=0;i<invStates.length;i++){
    if(invStates[i])continue;
    const ib=LV.invisBlocks[i];
    if(player.vy<0&&
       player.x+player.w>ib.x&&player.x<ib.x+ib.w&&
       player.y+player.vy<=ib.y+ib.h&&player.y>ib.y){
      invStates[i]=true;
      player.vy=5;
      spawnParticle(ib.x+10,ib.y,'#FFD700',6);
    }
  }

  player.onGround=false;
  player.y+=player.vy;

  for(const t of (LV.trampolines||[])){
    if(player.vy>0&&overlap(player.x,player.y,player.w,player.h,t.x,t.y,t.w,t.h)&&player.y+player.h-player.vy<=t.y+4){
      player.y=t.y-player.h; player.vy=JF*1.45; player.onGround=true;
    }
  }

  for(const p of allSolids()){
    if(overlap(player.x,player.y,player.w,player.h,p.x,p.y,p.w,p.h)){
      if(player.vy>0&&player.y+player.h-player.vy<=p.y+4){
        player.y=p.y-player.h; player.vy=0; player.onGround=true;
        if(p.dx!==undefined)player.x+=p.dx;
      } else if(player.vy<0){
        player.y=p.y+p.h; player.vy=2;
      }
    }
  }

  for(const s of (LV.spikes||[])){
    const sy=s.face==='up'?(s.y||350):(s.y||0);
    const sh=12;
    if(overlap(player.x+2,player.y+4,player.w-4,player.h-4,s.x,sy,s.w,sh))die();
  }

  for(const lv of (LV.lava||[])){
    if(overlap(player.x,player.y,player.w,player.h,lv.x,lv.y,lv.w,lv.h))die();
  }

  if(player.y>H+120)die();

  (LV.coins||[]).forEach((c,i)=>{
    if(!coinStates[i]&&overlap(player.x,player.y,player.w,player.h,c.x-8,c.y-8,16,16)){
      coinStates[i]=true; totalCoins++; hC.textContent=totalCoins;
      spawnParticle(c.x,c.y,'#FFD700',5);
    }
  });

  if(overlap(player.x,player.y,player.w,player.h,LV.goalX,LV.goalY,30,H-LV.goalY)){
    if(lvlIdx<LEVELS.length-1){
      bigMsg.textContent='LEVEL CLEAR!';
      subMsg.textContent='Brace yourself for '+LEVELS[lvlIdx+1].name;
      gameState='win';
      setTimeout(()=>{initLevel(lvlIdx+1);},2200);
    } else {
      bigMsg.textContent='YOU WIN!!!';
      subMsg.textContent='Legendary. Deaths: '+deaths+' | Coins: '+totalCoins;
      gameState='win';
    }
  }

  camX=Math.max(0,Math.min(LV.width-W,player.x-W/3));
}

// -------- DRAWING --------
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,LV.bg[0]); g.addColorStop(1,LV.bg[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  if(LV.bg[0]==='#5c94fc'){
    ctx.fillStyle='#ffffffcc';
    const clds=[{x:80,y:60,r:25},{x:220,y:45,r:18},{x:400,y:70,r:30},{x:560,y:50,r:22}];
    for(const c of clds){
      const cx=(c.x-(camX*0.2)+LV.width)%(W+120)-60;
      ctx.beginPath();ctx.arc(cx,c.y,c.r,0,Math.PI*2);
      ctx.arc(cx+c.r,c.y-8,c.r*.75,0,Math.PI*2);
      ctx.arc(cx+c.r*1.8,c.y,c.r*.6,0,Math.PI*2);
      ctx.fill();
    }
  } else {
    ctx.fillStyle='#fff8';
    for(let i=0;i<40;i++){
      const sx=(i*137+100-(camX*0.1))%W;
      const sy=(i*97+50)%280;
      ctx.fillRect(sx,sy,2,2);
    }
  }
}

function drawSolid(p){
  const x=p.x-camX,y=p.y;
  ctx.fillStyle='#5a3000'; ctx.fillRect(x,y,p.w,p.h);
  ctx.fillStyle='#44aa22'; ctx.fillRect(x,y,p.w,6);
  ctx.fillStyle='#33881a'; ctx.fillRect(x,y+6,p.w,3);
  if(LV.bg[0]!=='#5c94fc'){
    ctx.fillStyle='#7a4510'; ctx.fillRect(x,y,p.w,6);
  }
  ctx.strokeStyle='#3a1a00'; ctx.lineWidth=1;
  ctx.strokeRect(x,y,p.w,p.h);
}

function drawMovPlatform(p){
  const x=p.x-camX;
  ctx.fillStyle='#994400'; ctx.fillRect(x,p.y,p.w,p.h);
  ctx.fillStyle='#dd6600'; ctx.fillRect(x,p.y,p.w,5);
  ctx.strokeStyle='#660000'; ctx.lineWidth=1; ctx.strokeRect(x,p.y,p.w,p.h);
  ctx.fillStyle='#ffcc00'; ctx.font='10px monospace';
  ctx.fillText(p.dx?'↔':'↕',x+p.w/2-5,p.y+11);
}

function drawSpike(s){
  const sy=s.face==='up'?(s.y||350):(s.y||0);
  const num=Math.floor(s.w/10);
  ctx.fillStyle='#aaaacc';
  for(let i=0;i<num;i++){
    const sx=s.x-camX+i*10;
    ctx.beginPath();
    if(s.face==='up'){
      ctx.moveTo(sx,sy+12); ctx.lineTo(sx+5,sy); ctx.lineTo(sx+10,sy+12);
    } else {
      ctx.moveTo(sx,sy); ctx.lineTo(sx+5,sy+12); ctx.lineTo(sx+10,sy);
    }
    ctx.closePath(); ctx.fill();
  }
}

function drawLava(lv){
  const t=frame*0.05;
  const x=lv.x-camX;
  ctx.fillStyle='#cc2200'; ctx.fillRect(x,lv.y,lv.w,lv.h);
  ctx.fillStyle='#ff4400';
  for(let i=0;i<lv.w;i+=12){
    const wave=Math.sin(t+i*0.3)*3;
    ctx.fillRect(x+i,lv.y+wave,10,6);
  }
  ctx.fillStyle='#ff660088';
  ctx.fillRect(x,lv.y,lv.w,4);
}

function drawCoin(c,i){
  if(coinStates[i])return;
  const t=frame*0.07+i;
  const cx=c.x-camX, cy=c.y-Math.sin(t)*3;
  ctx.fillStyle='#FFD700'; ctx.strokeStyle='#FFA500'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff9';
  ctx.beginPath(); ctx.arc(cx-2,cy-2,3,0,Math.PI*2); ctx.fill();
}

function drawInvis(ib,i){
  if(!invStates[i])return;
  const x=ib.x-camX;
  ctx.fillStyle='#c84000'; ctx.fillRect(x,ib.y,ib.w,ib.h);
  ctx.fillStyle='#ff8844'; ctx.fillRect(x+2,ib.y+2,ib.w-4,4);
  ctx.strokeStyle='#881500'; ctx.lineWidth=1; ctx.strokeRect(x,ib.y,ib.w,ib.h);
}

function drawTrampoline(t){
  const x=t.x-camX;
  ctx.fillStyle='#338833'; ctx.fillRect(x,t.y,t.w,t.h);
  ctx.fillStyle='#66ff66'; ctx.fillRect(x+3,t.y+2,t.w-6,4);
  ctx.strokeStyle='#115511'; ctx.lineWidth=1; ctx.strokeRect(x,t.y,t.w,t.h);
}

function drawEnemy(e){
  if(!e.alive)return;
  const x=e.x-camX;
  if(e.type==='goomba'){
    ctx.fillStyle='#8B4513';
    ctx.fillRect(x,e.y,18,16);
    ctx.fillStyle='#f5deb3';
    ctx.fillRect(x+2,e.y+2,14,8);
    ctx.fillStyle='#fff';
    ctx.fillRect(x+3,e.y+3,4,4);
    ctx.fillRect(x+11,e.y+3,4,4);
    ctx.fillStyle='#000';
    ctx.fillRect(x+(e.vx<0?4:5),e.y+4,2,2);
    ctx.fillRect(x+(e.vx<0?12:13),e.y+4,2,2);
    ctx.fillStyle='#333';
    ctx.fillRect(x-2,e.y+16,8,4);
    ctx.fillRect(x+12,e.y+16,8,4);
  } else {
    ctx.fillStyle='#228800';
    ctx.fillRect(x,e.y,22,18);
    ctx.fillStyle='#aaff44';
    ctx.fillRect(x+3,e.y+2,16,12);
    ctx.fillStyle='#ffee00';
    ctx.fillRect(x+4,e.y+2,14,8);
    ctx.fillStyle='#000';
    ctx.fillRect(x+(e.vx<0?5:11),e.y+4,3,3);
    ctx.fillStyle='#333';
    ctx.fillRect(x,e.y+18,9,4);
    ctx.fillRect(x+13,e.y+18,9,4);
  }
}

function drawGoal(){
  const x=LV.goalX-camX, y=LV.goalY;
  ctx.fillStyle='#888'; ctx.fillRect(x+12,y,6,H-y);
  const wave=Math.sin(frame*0.06)*6;
  ctx.fillStyle='#ff3333';
  ctx.beginPath();
  ctx.moveTo(x+18,y+4);
  ctx.lineTo(x+44+wave,y+14);
  ctx.lineTo(x+18,y+26);
  ctx.fill();
  ctx.fillStyle='#FFD700'; ctx.font='16px monospace';
  ctx.fillText('★',x+5,y-5+Math.sin(frame*0.04)*3);
}

function drawPlayer(){
  if(!player.dead&&player.y>H+50)return;
  const x=player.x-camX, y=player.y;
  const a=player.dead?0.5:1;
  ctx.globalAlpha=a;
  if(player.onGround){ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(x+9,y+player.h+1,10,3,0,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#cc0000'; ctx.fillRect(x,y,18,7);
  ctx.fillRect(x-2,y+5,22,4);
  ctx.fillStyle='#ffcc99'; ctx.fillRect(x,y+8,18,9);
  ctx.fillStyle='#442200'; ctx.fillRect(x+2,y+14,14,3);
  ctx.fillStyle='#222'; ctx.fillRect(x+3,y+9,3,3); ctx.fillRect(x+11,y+9,3,3);
  ctx.fillStyle='#fff'; ctx.fillRect(x+4,y+9,2,2); ctx.fillRect(x+12,y+9,2,2);
  ctx.fillStyle='#0033cc'; ctx.fillRect(x,y+17,18,5);
  ctx.fillStyle='#cc0000'; ctx.fillRect(x,y+17,6,4); ctx.fillRect(x+12,y+17,6,4);
  ctx.fillStyle='#331100';
  if(player.vx!==0){
    const f=Math.floor(frame/8)%2;
    ctx.fillRect(x+(f?5:-2),y+20,9,4);
    ctx.fillRect(x+(f?9:11),y+20,9,4);
  } else {
    ctx.fillRect(x-2,y+20,9,4); ctx.fillRect(x+11,y+20,9,4);
  }
  ctx.globalAlpha=1;
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x-camX,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawHints(){
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.font='bold 12px Courier New';
  ctx.fillText(LV.name,8,20);
  for(let i=0;i<invStates.length;i++){
    if(invStates[i])continue;
    const ib=LV.invisBlocks[i];
    if(Math.floor(frame/30)%5===0){
      ctx.fillStyle='rgba(255,200,100,0.08)';
      ctx.fillRect(ib.x-camX,ib.y,ib.w,ib.h);
    }
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawBG();
  for(const p of LV.solids)drawSolid(p);
  for(const p of movPlatforms)drawMovPlatform(p);
  for(const s of(LV.spikes||[]))drawSpike(s);
  for(const lv of(LV.lava||[]))drawLava(lv);
  for(const t of(LV.trampolines||[]))drawTrampoline(t);
  (LV.invisBlocks||[]).forEach((ib,i)=>drawInvis(ib,i));
  (LV.coins||[]).forEach((c,i)=>drawCoin(c,i));
  drawGoal();
  for(const e of enemyStates)drawEnemy(e);
  drawPlayer();
  drawParticles();
  drawHints();
}

function loop(){
  frame++;
  if(gameState==='playing'){
    updateMovPlats();
    updatePlayer();
    updateEnemies();
    updateParticles();
  } else {
    updateParticles();
  }
  render();
  requestAnimationFrame(loop);
}

initLevel(0);
requestAnimationFrame(loop);
</script>
