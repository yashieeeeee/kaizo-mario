<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow:hidden;}
#hud{width:100%;background:#111;border-bottom:2px solid #333;display:flex;justify-content:space-between;align-items:center;padding:5px 18px;color:#fff;font-size:11px;font-weight:bold;letter-spacing:1px;flex-shrink:0;}

#canvasWrap{position:relative;flex:1 1 auto;display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden;}
canvas{display:block;image-rendering:pixelated;}
#screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:none;gap:10px;z-index:100;}
#bigMsg{font-family:'Press Start 2P',monospace;font-size:clamp(16px,4vw,28px);color:#fff;text-shadow:4px 4px 0 #ff0000;letter-spacing:3px;text-align:center;padding:0 20px;animation:glitch .4s infinite;}
#subMsg{font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.5vw,11px);color:#ffdd00;text-shadow:2px 2px 0 #885500;letter-spacing:1px;text-align:center;padding:0 20px;margin-top:6px;}
#restartBtn,#menuBtn{pointer-events:all;font-family:'Press Start 2P',monospace;padding:10px 28px;background:#000;border:2px solid currentColor;font-size:clamp(8px,1.5vw,11px);cursor:pointer;letter-spacing:2px;transition:all .1s;margin-top:6px;}
#restartBtn{color:#00ff88;border-color:#00ff88;}#restartBtn:hover{background:#00ff88;color:#000;}
#menuBtn{color:#ffdd00;border-color:#ffdd00;}#menuBtn:hover{background:#ffdd00;color:#000;}
@keyframes glitch{0%{text-shadow:4px 4px 0 #f00}50%{text-shadow:-4px 4px 0 #00f}100%{text-shadow:4px 4px 0 #f00}}
#controls{font-size:9px;color:#333;text-align:center;padding:3px 0;flex-shrink:0;letter-spacing:1px;width:100%;background:#000;}
#touchpad{display:none;width:100%;background:#111;border-top:1px solid #222;padding:8px 16px;justify-content:space-between;align-items:center;flex-shrink:0;}
@media(max-width:700px),(pointer:coarse){#touchpad{display:flex}#controls{display:none}}
.tbtn{background:#1a1a1a;border:2px solid #444;color:#fff;font-size:22px;width:60px;height:60px;border-radius:10px;cursor:pointer;user-select:none;-webkit-user-select:none;display:flex;align-items:center;justify-content:center;touch-action:none;}
.tbtn:active,.tbtn.pressed{background:#333;border-color:#888;}
#rotateMask{display:none;position:fixed;inset:0;background:#000;z-index:9999;flex-direction:column;justify-content:center;align-items:center;color:#fff;font-size:18px;font-weight:bold;text-align:center;gap:12px;}

// ── CANVAS RESPONSIVE ────────────────────────────────────────
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=640,H=400;
const wrap=document.getElementById('canvasWrap');

function resize(){
  const hudH   = document.getElementById('hud').offsetHeight;
  const ctrlH  = document.getElementById('controls').offsetHeight || 0;
  const padH   = document.getElementById('touchpad').offsetHeight || 0;
  const avW    = window.innerWidth;
  const avH    = window.innerHeight - hudH - ctrlH - padH;

  // Fill as much of the available space as possible, keep 8:5 ratio
  let w = avW;
  let h = w * (H / W);
  if(h > avH){ h = avH; w = h * (W / H); }

  cv.style.width  = w + 'px';
  cv.style.height = h + 'px';
  wrap.style.width  = '100%';
  wrap.style.height = avH + 'px';
}
window.addEventListener('resize',resize);
resize();

// ── INPUT ────────────────────────────────────────────────────
let tL=false,tR=false,tJump=false,tJumpFresh=false;

['tL','tR','tJ'].forEach(id=>{
  const el=document.getElementById(id);
  const press=()=>{
    if(id==='tL')tL=true;
    if(id==='tR')tR=true;
    if(id==='tJ'){tJump=true;tJumpFresh=true;}
    el.classList.add('pressed');
  };
  const release=()=>{
    if(id==='tL')tL=false;
    if(id==='tR')tR=false;
    if(id==='tJ')tJump=false;
    el.classList.remove('pressed');
  };
  el.addEventListener('touchstart',e=>{e.preventDefault();press();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();release();},{passive:false});
  el.addEventListener('mousedown',press);
  el.addEventListener('mouseup',release);
});

const K={};let jumpFresh=false;
document.addEventListener('keydown',e=>{
  if(K[e.key])return;
  K[e.key]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp',' ','z','Z','r','R','Escape'].includes(e.key))e.preventDefault();
  if(e.key==='ArrowUp'||e.key===' '||e.key==='z'||e.key==='Z'){jumpFresh=true;}
  if(e.key==='r'||e.key==='R')onRestart();
  if(e.key==='Escape')goWorldSelect();
});
document.addEventListener('keyup',e=>{K[e.key]=false;});

// mouse click on canvas (world select)
let mouseX=0,mouseY=0,mouseClicked=false;
function canvasPos(cx,cy){const r=cv.getBoundingClientRect();return{x:(cx-r.left)*(W/r.width),y:(cy-r.top)*(H/r.height)};}
cv.addEventListener('mousemove',e=>{const p=canvasPos(e.clientX,e.clientY);mouseX=p.x;mouseY=p.y;});
cv.addEventListener('click',e=>{const p=canvasPos(e.clientX,e.clientY);mouseX=p.x;mouseY=p.y;mouseClicked=true;});
cv.addEventListener('touchend',e=>{const t=e.changedTouches[0];const p=canvasPos(t.clientX,t.clientY);mouseX=p.x;mouseY=p.y;mouseClicked=true;e.preventDefault();},{passive:false});

// ── GAME STATE VARIABLES ─────────────────────────────────────
let deaths=0, totalCoins=0, gameState='worldSelect';
let camX=0, frame=0, timer=300, timerTick=0;
let particles=[];
let lvlIdx=0, LV, player, movPlats, coinSt, invSt, enSt;
let curWorld=null;
const MAXFALL=14, SPD=3.2;

// HUD refs
const hLv=document.getElementById('hLv'),hD=document.getElementById('hD');
const hC=document.getElementById('hC'),hT=document.getElementById('hT'),hW=document.getElementById('hW');
const bigMsg=document.getElementById('bigMsg'),subMsg=document.getElementById('subMsg');
const restartBtn=document.getElementById('restartBtn'),menuBtn=document.getElementById('menuBtn');

// ── INIT LEVEL ───────────────────────────────────────────────
function initLevel(i){
  lvlIdx=i;
  LV=LEVELS[i];
  curWorld=WORLDS.find(w=>i>=w.lr[0]&&i<=w.lr[1]);

  hW.textContent=curWorld.name;
  hLv.textContent=(i-curWorld.lr[0])+1;
  hT.textContent=300;

  player={
    x:LV.ps.x, y:LV.ps.y,
    vx:0, vy:0,
    w:18, h:22,
    onGround:false,
    jumpHeld:false,
    jumpFrames:0,       // counts how many frames jump-hold has been applied
    dead:false,
    deadTimer:0
  };

  camX=0; frame=0; timer=300; timerTick=0; particles=[];
  movPlats = (LV.mp||[]).map(p=>({...p}));
  coinSt   = (LV.co||[]).map(()=>false);
  invSt    = (LV.ib||[]).map(()=>false);
  enSt     = (LV.en||[]).map(e=>({...e,alive:true}));

  gameState='playing';
  bigMsg.textContent='';
  subMsg.textContent='';
  restartBtn.style.display='none';
  menuBtn.style.display='none';
  jumpFresh=false;
  tJumpFresh=false;
  K._jdown=false;
}

// ── WORLD SELECT / RESTART ───────────────────────────────────
function goWorldSelect(){
  gameState='worldSelect';
  bigMsg.textContent='';
  subMsg.textContent='';
  restartBtn.style.display='none';
  menuBtn.style.display='none';
  hW.textContent='--';
  hLv.textContent='-';
  hT.textContent='---';
}

function onRestart(){ initLevel(lvlIdx); }

function startWorld(wi){
  curWorld=WORLDS[wi];
  initLevel(curWorld.lr[0]);
}

// ── HELPERS ──────────────────────────────────────────────────
function overlap(ax,ay,aw,ah, bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function allSolids(){ return [...LV.sol, ...movPlats]; }

function spawnP(x,y,col,n){
  for(let i=0;i<n;i++)
    particles.push({
      x, y,
      vx:(Math.random()-.5)*5,
      vy:Math.random()*-5-2,
      life:30, col,
      r:Math.random()*4+2
    });
}

function updParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.3; p.life--;
    return p.life>0;
  });
}

// ── MOVING PLATFORMS ─────────────────────────────────────────
function updMovPlats(){
  for(const p of movPlats){
    if(p.dx!==undefined){
      p.x+=p.dx;
      if(p.x<p.mn || p.x+p.w>p.mx) p.dx*=-1;
    }
    if(p.dy!==undefined){
      p.y+=p.dy;
      if(p.y<p.mn || p.y>p.mx) p.dy*=-1;
    }
  }
}

// ── ENEMIES ──────────────────────────────────────────────────
function updEnemies(){
  for(const e of enSt){
    if(!e.alive) continue;
    e.x+=e.vx;
    if(e.x<=e.mn || e.x>=e.mx) e.vx*=-1;

    if(!player.dead){
      if(overlap(player.x,player.y,player.w,player.h, e.x,e.y,22,20)){
        // stomp from above
        if(player.vy>0 && player.y+player.h < e.y+12){
          e.alive=false;
          player.vy=-7;
          spawnP(e.x+9,e.y+10,'#c84000',8);
          totalCoins++; hC.textContent=totalCoins;
        } else {
          die();
        }
      }
    }
  }
}

// ── DIE ──────────────────────────────────────────────────────
function die(){
  if(player.dead) return;
  player.dead=true;
  player.deadTimer=60;
  player.vy=-9;
  player.vx=(Math.random()-.5)*3;
  spawnP(player.x+9,player.y+11,'#ff4444',14);
  deaths++;
  hD.textContent=deaths;
}

// ── PLAYER UPDATE ────────────────────────────────────────────
const MAX_JUMP_FRAMES=10; // hold longer than this = no more boost

function updPlayer(){
  // ─ Dead animation ─
  if(player.dead){
    player.deadTimer--;
    player.vy+=LV.grav;
    player.x+=player.vx;
    player.y+=player.vy;
    if(player.deadTimer<=0){
      const msgs=[
        ['OOPS!','Try again!'],
        ['YOU DIED','One more try!'],
        ['SO CLOSE','Keep going!'],
        ['NICE TRY','Almost!'],
        ['UNLUCKY!','You got this!'],
        ['AW MAN!','Deaths: '+deaths],
        ['KEEP GOING','Deaths: '+deaths],
        ['BREATHE...','Deaths: '+deaths],
        ['DONT GIVE UP','Deaths: '+deaths],
      ];
      const m=msgs[Math.min(Math.floor(deaths/2), msgs.length-1)];
      bigMsg.textContent=m[0];
      subMsg.textContent=m[1];
      restartBtn.style.display='inline-block';
      menuBtn.style.display='inline-block';
      gameState='dead';
    }
    return;
  }

  // ─ Timer ─
  timerTick++;
  if(timerTick>=60){ timerTick=0; timer--; hT.textContent=timer; if(timer<=0) die(); }

  // ─ Read input ─
  const holdingJump = K['ArrowUp']||K[' ']||K['z']||K['Z']||tJump;
  const freshJump   = jumpFresh||tJumpFresh;
  jumpFresh=false; tJumpFresh=false;

  // ─ Horizontal ─
  player.vx=0;
  if(K['ArrowLeft'] ||K['a']||tL) player.vx=-SPD;
  if(K['ArrowRight']||K['d']||tR) player.vx= SPD;

  // ─ Jump START (only when on ground) ─
  if(freshJump && player.onGround){
    player.vy=LV.jf;
    player.jumpHeld=true;
    player.jumpFrames=0;
  }

  // ─ Jump HOLD boost — LIMITED to MAX_JUMP_FRAMES ─
  if(player.jumpHeld && holdingJump && player.vy<0 && player.jumpFrames<MAX_JUMP_FRAMES){
    player.vy-=0.6;       // small upward nudge each frame
    player.jumpFrames++;
  }
  if(!holdingJump) player.jumpHeld=false;  // release early = shorter jump

  // ─ Gravity ─
  player.vy+=LV.grav;
  if(player.vy>MAXFALL) player.vy=MAXFALL;

  // ─ X movement + horizontal collision ─
  player.x+=player.vx;
  player.x=Math.max(0, Math.min(LV.width-player.w, player.x));
  for(const p of allSolids()){
    if(overlap(player.x,player.y,player.w,player.h, p.x,p.y,p.w,p.h)){
      if(player.vx>0) player.x=p.x-player.w;
      else            player.x=p.x+p.w;
      player.vx=0;
    }
  }

  // ─ Invisible blocks (hit from below) ─
  for(let i=0;i<invSt.length;i++){
    if(invSt[i]) continue;
    const ib=LV.ib[i];
    if(player.vy<0
       && player.x+player.w>ib.x && player.x<ib.x+ib.w
       && player.y+player.vy<=ib.y+ib.h && player.y>ib.y){
      invSt[i]=true;
      player.vy=4;
      player.jumpHeld=false;
      spawnP(ib.x+10,ib.y,'#FFD700',6);
    }
  }

  // ─ Y movement ─
  player.onGround=false;
  player.y+=player.vy;

  // ─ Trampolines ─
  for(const t of (LV.tr||[])){
    if(player.vy>0
       && overlap(player.x,player.y,player.w,player.h, t.x,t.y,t.w,t.h)
       && player.y+player.h-player.vy<=t.y+4){
      player.y=t.y-player.h;
      player.vy=LV.jf*1.4;
      player.onGround=true;
      player.jumpHeld=false;
    }
  }

  // ─ Vertical collision with solids ─
  for(const p of allSolids()){
    if(overlap(player.x,player.y,player.w,player.h, p.x,p.y,p.w,p.h)){
      if(player.vy>0 && player.y+player.h-player.vy<=p.y+4){
        player.y=p.y-player.h;
        player.vy=0;
        player.onGround=true;
        player.jumpHeld=false;
        if(p.dx!==undefined) player.x+=p.dx; // ride platform
      } else if(player.vy<0){
        player.y=p.y+p.h;
        player.vy=2;
        player.jumpHeld=false;
      }
    }
  }

  // ─ Spikes ─
  for(const s of (LV.spk||[])){
    const sy = s.f==='u' ? (s.y||350) : (s.y||0);
    if(overlap(player.x+2,player.y+4,player.w-4,player.h-4, s.x,sy,s.w,12)) die();
  }

  // ─ Lava / liquid hazard ─
  for(const lv of (LV.lv||[])){
    if(overlap(player.x,player.y,player.w,player.h, lv.x,lv.y,lv.w,lv.h)) die();
  }

  // ─ Fall off screen ─
  if(player.y>H+100) die();

  // ─ Collect coins ─
  (LV.co||[]).forEach((c,i)=>{
    if(!coinSt[i] && overlap(player.x,player.y,player.w,player.h, c.x-8,c.y-8,16,16)){
      coinSt[i]=true;
      totalCoins++;
      hC.textContent=totalCoins;
      spawnP(c.x,c.y,'#FFD700',5);
    }
  });

  // ─ Goal flag ─
  if(overlap(player.x,player.y,player.w,player.h, LV.gx,LV.gy,30,H-LV.gy)){
    if(lvlIdx<curWorld.lr[1]){
      bigMsg.textContent='LEVEL CLEAR!';
      subMsg.textContent='Get ready for level '+(( lvlIdx-curWorld.lr[0])+2)+'!';
      gameState='win';
      setTimeout(()=>initLevel(lvlIdx+1), 2000);
    } else {
      bigMsg.textContent=curWorld.name+' CLEAR!';
      subMsg.textContent='Amazing! Deaths: '+deaths;
      menuBtn.style.display='inline-block';
      gameState='worldClear';
    }
  }

  // ─ Camera ─
  camX=Math.max(0, Math.min(LV.width-W, player.x-W/3));
}

// ── WORLD SELECT SCREEN ──────────────────────────────────────
const CARDS=[
  {x:30, y:62, w:272,h:148,wi:0},
  {x:338,y:62, w:272,h:148,wi:1},
  {x:30, y:226,w:272,h:148,wi:2},
  {x:338,y:226,w:272,h:148,wi:3},
];

function drawWorldSelect(){
  // Background
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#000018'); g.addColorStop(1,'#000028');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Twinkling stars
  for(let i=0;i<80;i++){
    const sx=(i*139+50)%W, sy=(i*97+20)%H;
    const blink=Math.sin(frame*0.05+i)>0.5;
    ctx.fillStyle=blink?'rgba(255,255,255,0.9)':'rgba(180,180,255,0.2)';
    ctx.fillRect(sx,sy,blink?2:1,blink?2:1);
  }

  // Title
  ctx.textAlign='center';
  const tg=ctx.createLinearGradient(0,0,W,0);
  tg.addColorStop(0,'#ff4400');
  tg.addColorStop(0.5,'#ffdd00');
  tg.addColorStop(1,'#ff4400');
  ctx.fillStyle=tg;
  ctx.font='18px "Press Start 2P"';
  ctx.shadowColor='#ff8800'; ctx.shadowBlur=14;
  ctx.fillText('KAIZO WORLD',W/2,34);
  ctx.shadowBlur=0;
  ctx.fillStyle='#444';
  ctx.font='7px "Press Start 2P"';
  ctx.fillText('CHOOSE YOUR ADVENTURE',W/2,50);

  // Draw each world card
  for(const card of CARDS){
    const wm=WORLDS[card.wi];
    const hov=mouseX>=card.x&&mouseX<=card.x+card.w&&mouseY>=card.y&&mouseY<=card.y+card.h;

    // Card background
    ctx.fillStyle=hov ? wm.dark : '#070707';
    ctx.fillRect(card.x,card.y,card.w,card.h);

    // Glowing border on hover
    ctx.lineWidth=hov?2.5:1;
    ctx.strokeStyle=hov?wm.color:'#222';
    if(hov){ ctx.shadowColor=wm.color; ctx.shadowBlur=14; }
    ctx.strokeRect(card.x,card.y,card.w,card.h);
    ctx.shadowBlur=0;

    // Top colour strip
    ctx.fillStyle=wm.color+'22';
    ctx.fillRect(card.x,card.y,card.w,24);
    ctx.fillStyle=wm.color;
    ctx.fillRect(card.x,card.y,card.w,3);

    // Emoji
    ctx.font='24px serif'; ctx.textAlign='left';
    ctx.fillText(wm.emoji, card.x+10, card.y+40);

    // World name
    ctx.fillStyle=wm.color;
    ctx.font='9px "Press Start 2P"';
    ctx.shadowColor=hov?wm.color:'transparent';
    ctx.shadowBlur=hov?6:0;
    ctx.fillText(wm.name, card.x+10, card.y+63);
    ctx.shadowBlur=0;

    // Subtitle
    ctx.fillStyle='#555';
    ctx.font='6px "Press Start 2P"';
    ctx.fillText(wm.sub, card.x+10, card.y+79);

    // Level count
    ctx.fillStyle='#383838';
    ctx.font='6px "Press Start 2P"';
    ctx.fillText('2 LEVELS', card.x+10, card.y+95);

    // Difficulty stars
    ctx.fillStyle='#ffaa00';
    ctx.font='10px "Press Start 2P"';
    ctx.fillText(wm.diff, card.x+10, card.y+116);

    // Enter hint
    if(hov){
      ctx.fillStyle=wm.color;
      ctx.font='7px "Press Start 2P"';
      ctx.textAlign='right';
      ctx.fillText('▶ PLAY', card.x+card.w-8, card.y+card.h-8);
    }
    ctx.textAlign='left';
  }

  // Footer stats
  ctx.fillStyle='#2a2a2a';
  ctx.font='7px "Press Start 2P"';
  ctx.textAlign='center';
  ctx.fillText('DEATHS: '+deaths+'   TOTAL COINS: '+totalCoins, W/2, H-8);
  ctx.textAlign='left';

  // Handle clicks on cards
  if(mouseClicked){
    for(const card of CARDS){
      if(mouseX>=card.x&&mouseX<=card.x+card.w&&mouseY>=card.y&&mouseY<=card.y+card.h){
        startWorld(card.wi);
      }
    }
  }
}

// ── DRAW BACKGROUND ──────────────────────────────────────────
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,LV.bg[0]); g.addColorStop(1,LV.bg[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  if(LV.wt==='land'){
    // Fluffy clouds (parallax)
    ctx.fillStyle='rgba(255,255,255,0.82)';
    for(const c of [{x:80,y:55,r:22},{x:230,y:42,r:18},{x:410,y:62,r:26},{x:570,y:46,r:20}]){
      const cx=(c.x-(camX*0.2)+LV.width)%(W+140)-70;
      ctx.beginPath();
      ctx.arc(cx,      c.y,   c.r,    0,Math.PI*2);
      ctx.arc(cx+c.r,  c.y-8, c.r*.7, 0,Math.PI*2);
      ctx.arc(cx+c.r*1.8,c.y, c.r*.55,0,Math.PI*2);
      ctx.fill();
    }
    // Birds (simple V shapes)
    for(let i=0;i<3;i++){
      const bx=((i*220+frame*0.4)%W);
      const by=40+i*18+Math.sin(frame*0.03+i)*6;
      ctx.strokeStyle='rgba(0,0,80,0.25)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(bx-8,by); ctx.lineTo(bx,by-5); ctx.lineTo(bx+8,by);
      ctx.stroke();
    }
  }

  if(LV.wt==='sea'){
    // Rising bubbles
    for(let i=0;i<28;i++){
      const bx=((i*137+(frame*0.5|0))%(W+40))-20;
      const by=((i*97+frame*0.8)%H);
      ctx.fillStyle=`rgba(100,200,255,${0.06+i%3*0.03})`;
      ctx.beginPath(); ctx.arc(bx,by,(i%3)+1.5,0,Math.PI*2); ctx.fill();
    }
    // Light shafts from surface
    ctx.fillStyle='rgba(80,160,255,0.018)';
    for(let i=0;i<4;i++){
      const rx=(i*180-(camX*0.04))%W;
      ctx.beginPath();
      ctx.moveTo(rx,0); ctx.lineTo(rx-28,H); ctx.lineTo(rx+28,H); ctx.lineTo(rx+56,0);
      ctx.fill();
    }
  }

  if(LV.wt==='mine'){
    // Floating dust specks
    for(let i=0;i<50;i++){
      const rx=((i*137-camX*0.3+LV.width)%W);
      const ry=(i*97)%H;
      ctx.fillStyle='rgba(90,55,10,0.09)';
      ctx.fillRect(rx,ry,(i%3)+1,(i%3)+1);
    }
    // Warm lantern glows along the path
    for(let i=0;i<5;i++){
      const lx=((i*700-camX+LV.width)%LV.width)-camX;
      if(lx>-80&&lx<W+80){
        const pulse=0.1+Math.sin(frame*0.06+i)*0.03;
        const lg=ctx.createRadialGradient(lx,310,0,lx,310,80);
        lg.addColorStop(0,`rgba(255,160,0,${pulse})`);
        lg.addColorStop(1,'transparent');
        ctx.fillStyle=lg;
        ctx.beginPath(); ctx.arc(lx,310,80,0,Math.PI*2); ctx.fill();
      }
    }
  }

  if(LV.wt==='space'){
    // Twinkling stars (parallax)
    for(let i=0;i<90;i++){
      const sx=((i*139+50-camX*0.07+LV.width)%(W+8));
      const sy=(i*97+20)%H;
      const b=Math.sin(frame*0.04+i)>0.35;
      ctx.fillStyle=`rgba(${b?'255,255,255':'160,160,255'},${b?0.9:0.28})`;
      ctx.fillRect(sx,sy,b?2:1,b?2:1);
    }
    // Nebula colour blobs
    const nb=['rgba(80,0,180,0.04)','rgba(0,60,200,0.04)','rgba(160,0,100,0.03)'];
    for(let i=0;i<3;i++){
      const nx=((i*280+60-camX*0.04)%(W+100));
      const ng=ctx.createRadialGradient(nx,i*100+55,0,nx,i*100+55,100);
      ng.addColorStop(0,nb[i]); ng.addColorStop(1,'transparent');
      ctx.fillStyle=ng;
      ctx.beginPath(); ctx.arc(nx,i*100+55,100,0,Math.PI*2); ctx.fill();
    }
    // Distant planet
    const px=((1100-camX*0.1)+LV.width)%W;
    if(px>-80&&px<W+80){
      ctx.fillStyle='rgba(90,50,150,0.13)';
      ctx.beginPath(); ctx.arc(px,72,46,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(110,70,170,0.08)';
      ctx.beginPath(); ctx.ellipse(px,72,76,11,-0.2,0,Math.PI*2); ctx.fill();
    }
  }
}

// ── DRAW SOLID PLATFORM ──────────────────────────────────────
function drawSolid(p){
  const x=p.x-camX;

  if(LV.wt==='land'){
    ctx.fillStyle='#5a3000'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#44aa22'; ctx.fillRect(x,p.y,p.w,6);
    ctx.fillStyle='#33881a'; ctx.fillRect(x,p.y+6,p.w,3);
    // Grass dots
    ctx.fillStyle='#55dd33';
    for(let i=6;i<p.w-4;i+=10){
      ctx.fillRect(x+i,p.y-2,2,3);
    }
  }

  else if(LV.wt==='sea'){
    ctx.fillStyle='#002855'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#0055aa'; ctx.fillRect(x,p.y,p.w,5);
    ctx.fillStyle='#ff6644'; ctx.fillRect(x,p.y,p.w,2); // coral top line
    // Small coral tufts on wider platforms
    if(p.w>50&&Math.floor(p.x/70)%2===0){
      ctx.fillStyle='#008800';
      ctx.fillRect(x+5, p.y-9, 4,10);
      ctx.fillRect(x+17,p.y-13,4,14);
    }
  }

  else if(LV.wt==='mine'){
    ctx.fillStyle='#2e1500'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#4a2800'; ctx.fillRect(x,p.y,p.w,5);
    // Gold vein flecks
    ctx.fillStyle='rgba(255,190,0,0.22)';
    for(let i=0;i<p.w;i+=16) ctx.fillRect(x+i,p.y+2,5,2);
    ctx.strokeStyle='#1a0800'; ctx.lineWidth=1;
    ctx.strokeRect(x,p.y,p.w,p.h);
  }

  else if(LV.wt==='space'){
    ctx.fillStyle='#12123a'; ctx.fillRect(x,p.y,p.w,p.h);
    ctx.fillStyle='#22225a'; ctx.fillRect(x,p.y,p.w,4);
    // LED dots along top
    ctx.fillStyle='#4444bb';
    for(let i=5;i<p.w;i+=18){
      ctx.beginPath(); ctx.arc(x+i,p.y+2,2,0,Math.PI*2); ctx.fill();
    }
  }
}

// ── DRAW MOVING PLATFORM ─────────────────────────────────────
function drawMovPlat(p){
  const x=p.x-camX;
  const styles={
    land: ['#883300','#cc5500'],
    sea:  ['#002d77','#0066cc'],
    mine: ['#441a00','#ddaa00'],
    space:['#1d0055','#6600cc'],
  };
  const [c1,c2]=styles[LV.wt]||styles.land;
  ctx.fillStyle=c1; ctx.fillRect(x,p.y,p.w,p.h);
  ctx.fillStyle=c2; ctx.fillRect(x,p.y,p.w,4);
  ctx.strokeStyle=c2; ctx.lineWidth=1.5; ctx.strokeRect(x,p.y,p.w,p.h);
  // Arrow hint
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText(p.dx?'↔':'↕', x+p.w/2, p.y+11);
  ctx.textAlign='left';
}

// ── DRAW SPIKES ──────────────────────────────────────────────
function drawSpike(s){
  const sy = s.f==='u' ? (s.y||350) : (s.y||0);
  const num = Math.floor(s.w/10);
  const cols={land:'#aaaacc', sea:'#ffee00', mine:'#dd7700', space:'#aa00ff'};
  ctx.fillStyle=cols[LV.wt]||'#aaaacc';
  for(let i=0;i<num;i++){
    const sx=s.x-camX+i*10;
    ctx.beginPath();
    if(s.f==='u'){
      ctx.moveTo(sx,   sy+12);
      ctx.lineTo(sx+5, sy);
      ctx.lineTo(sx+10,sy+12);
    } else {
      ctx.moveTo(sx,   sy);
      ctx.lineTo(sx+5, sy+12);
      ctx.lineTo(sx+10,sy);
    }
    ctx.closePath(); ctx.fill();
  }
}

// ── DRAW HAZARD LIQUID (lava / acid / plasma / electric sand) ─
function drawLava(lv){
  const t=frame*0.05, x=lv.x-camX;

  if(LV.wt==='sea'){
    // Electric sand — yellow
    ctx.fillStyle='#665500'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#ffee00';
    for(let i=0;i<lv.w;i+=10){
      ctx.fillRect(x+i, lv.y+Math.sin(t*2+i*0.4)*3, 8, 4);
    }
    ctx.fillStyle='rgba(255,220,0,0.28)'; ctx.fillRect(x,lv.y,lv.w,3);
  }
  else if(LV.wt==='mine'){
    // Acid — green
    ctx.fillStyle='#002200'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#00aa00';
    for(let i=0;i<lv.w;i+=12){
      ctx.fillRect(x+i, lv.y+Math.sin(t+i*0.3)*3, 10, 5);
    }
    ctx.fillStyle='rgba(0,200,0,0.28)'; ctx.fillRect(x,lv.y,lv.w,3);
  }
  else if(LV.wt==='space'){
    // Void plasma — purple
    ctx.fillStyle='#180030'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#aa00ff';
    for(let i=0;i<lv.w;i+=12){
      ctx.fillRect(x+i, lv.y+Math.sin(t*3+i*0.3)*3, 10, 5);
    }
    ctx.fillStyle='rgba(170,0,255,0.28)'; ctx.fillRect(x,lv.y,lv.w,3);
  }
  else {
    // Classic lava — land / default
    ctx.fillStyle='#cc2200'; ctx.fillRect(x,lv.y,lv.w,lv.h);
    ctx.fillStyle='#ff4400';
    for(let i=0;i<lv.w;i+=12){
      ctx.fillRect(x+i, lv.y+Math.sin(t+i*0.3)*3, 10, 6);
    }
    ctx.fillStyle='rgba(255,100,0,0.45)'; ctx.fillRect(x,lv.y,lv.w,4);
  }
}

// ── DRAW COINS ───────────────────────────────────────────────
function drawCoin(c,i){
  if(coinSt[i]) return;
  const t=frame*0.07+i;
  const cx=c.x-camX, cy=c.y-Math.sin(t)*3;
  const cols={land:'#FFD700', sea:'#00ffcc', mine:'#FFD700', space:'#cc88ff'};
  ctx.fillStyle=cols[LV.wt]||'#FFD700';
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx,cy,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(cx-2,cy-2,3,0,Math.PI*2); ctx.fill();
}

// ── DRAW INVISIBLE BLOCK (after revealed) ────────────────────
function drawInvis(ib,i){
  if(!invSt[i]) return;
  const x=ib.x-camX;
  ctx.fillStyle='#c84000'; ctx.fillRect(x,ib.y,ib.w,ib.h);
  ctx.fillStyle='#ff8844'; ctx.fillRect(x+2,ib.y+2,ib.w-4,4);
  ctx.strokeStyle='#881500'; ctx.lineWidth=1; ctx.strokeRect(x,ib.y,ib.w,ib.h);
}

// ── DRAW TRAMPOLINE ──────────────────────────────────────────
function drawTramp(t){
  const x=t.x-camX;
  const styles={
    land: ['#338833','#66ff66'],
    sea:  ['#004488','#0099ff'],
    mine: ['#885500','#ffcc00'],
    space:['#330077','#9933ff'],
  };
  const [c1,c2]=styles[LV.wt]||styles.land;
  ctx.fillStyle=c1; ctx.fillRect(x,t.y,t.w,t.h);
  ctx.fillStyle=c2; ctx.fillRect(x+3,t.y+2,t.w-6,4);
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1;
  ctx.strokeRect(x,t.y,t.w,t.h);
}

// ── DRAW ENEMY ───────────────────────────────────────────────
function drawEnemy(e){
  if(!e.alive) return;
  const x=e.x-camX;

  if(e.t==='goomba'){
    ctx.fillStyle='#8B4513'; ctx.fillRect(x,e.y,18,16);
    ctx.fillStyle='#f5deb3'; ctx.fillRect(x+2,e.y+2,14,8);
    ctx.fillStyle='#fff';    ctx.fillRect(x+3,e.y+3,4,4); ctx.fillRect(x+11,e.y+3,4,4);
    ctx.fillStyle='#000';    ctx.fillRect(x+(e.vx<0?4:5),e.y+4,2,2); ctx.fillRect(x+(e.vx<0?12:13),e.y+4,2,2);
    ctx.fillStyle='#333';    ctx.fillRect(x-2,e.y+16,8,4); ctx.fillRect(x+12,e.y+16,8,4);
  }

  else if(e.t==='koopa'){
    ctx.fillStyle='#228800'; ctx.fillRect(x,e.y,22,18);
    ctx.fillStyle='#aaff44'; ctx.fillRect(x+3,e.y+2,16,12);
    ctx.fillStyle='#ffee00'; ctx.fillRect(x+4,e.y+2,14,8);
    ctx.fillStyle='#000';    ctx.fillRect(x+(e.vx<0?5:11),e.y+4,3,3);
    ctx.fillStyle='#333';    ctx.fillRect(x,e.y+18,9,4); ctx.fillRect(x+13,e.y+18,9,4);
  }

  else if(e.t==='fish'){
    ctx.fillStyle='#ff6600'; ctx.fillRect(x,e.y+3,18,12);
    ctx.fillStyle='#ff9944'; ctx.fillRect(x+2,e.y+3,14,8);
    ctx.fillStyle='#fff';    ctx.fillRect(x+3,e.y+5,4,4);
    ctx.fillStyle='#000';    ctx.fillRect(x+4,e.y+6,2,2);
    // Tail fin
    ctx.fillStyle='#ff6600';
    if(e.vx<0){ ctx.beginPath(); ctx.moveTo(x+18,e.y+3); ctx.lineTo(x+26,e.y); ctx.lineTo(x+26,e.y+18); ctx.fill(); }
    else       { ctx.beginPath(); ctx.moveTo(x,e.y+3); ctx.lineTo(x-8,e.y); ctx.lineTo(x-8,e.y+18); ctx.fill(); }
    // Dorsal fin
    ctx.fillStyle='#ff4400'; ctx.fillRect(x+5,e.y,8,4);
  }

  else if(e.t==='eel'){
    ctx.fillStyle='#888800'; ctx.fillRect(x,e.y+2,26,10);
    ctx.fillStyle='#dddd00'; ctx.fillRect(x+2,e.y+3,22,6);
    ctx.fillStyle='#000';    ctx.fillRect(x+(e.vx<0?3:18),e.y+4,3,3);
    // Electric flash
    if(frame%10<5){ ctx.fillStyle='rgba(255,255,100,0.28)'; ctx.fillRect(x-3,e.y,32,16); }
  }

  else if(e.t==='bat'){
    // Body
    ctx.fillStyle='#330044'; ctx.fillRect(x+3,e.y+4,12,10);
    // Eyes
    ctx.fillStyle='#ff00cc'; ctx.fillRect(x+5,e.y+5,4,4); ctx.fillRect(x+9,e.y+5,4,4);
    ctx.fillStyle='#000';    ctx.fillRect(x+6,e.y+6,2,2); ctx.fillRect(x+10,e.y+6,2,2);
    // Flapping wings
    const wingUp=Math.sin(frame*0.3)>0;
    ctx.fillStyle='#220033';
    if(wingUp){
      ctx.beginPath(); ctx.moveTo(x+3,e.y+6); ctx.lineTo(x-9,e.y+1); ctx.lineTo(x+1,e.y+12); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x+15,e.y+6); ctx.lineTo(x+27,e.y+1); ctx.lineTo(x+17,e.y+12); ctx.fill();
    } else {
      ctx.beginPath(); ctx.moveTo(x+3,e.y+6); ctx.lineTo(x-9,e.y+15); ctx.lineTo(x+1,e.y+12); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x+15,e.y+6); ctx.lineTo(x+27,e.y+15); ctx.lineTo(x+17,e.y+12); ctx.fill();
    }
  }

  else if(e.t==='alien'){
    ctx.fillStyle='#003a00'; ctx.fillRect(x,e.y+4,20,14);
    ctx.fillStyle='#009900'; ctx.fillRect(x+3,e.y+2,14,16);
    ctx.fillStyle='#00ee00'; ctx.fillRect(x+5,e.y+3,10,8);
    ctx.fillStyle='#fff';    ctx.fillRect(x+5,e.y+4,5,5); ctx.fillRect(x+11,e.y+4,5,5);
    ctx.fillStyle='#ff0000'; ctx.fillRect(x+6,e.y+5,3,3); ctx.fillRect(x+12,e.y+5,3,3);
    // Antennae
    ctx.fillStyle='#00ee00';
    ctx.fillRect(x+7,e.y,2,4); ctx.fillRect(x+13,e.y,2,4);
    ctx.beginPath(); ctx.arc(x+8, e.y,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+14,e.y,3,0,Math.PI*2); ctx.fill();
  }
}

// ── DRAW GOAL FLAG ───────────────────────────────────────────
function drawGoal(){
  const x=LV.gx-camX, y=LV.gy;
  const poleCol ={land:'#888', sea:'#00bbff', mine:'#ffaa00', space:'#8800ff'};
  const flagCol ={land:'#ff3333', sea:'#ffff00', mine:'#ff8800', space:'#00ffff'};
  // Pole
  ctx.fillStyle=poleCol[LV.wt]||'#888';
  ctx.fillRect(x+12,y,5,H-y);
  // Waving flag
  const wave=Math.sin(frame*0.07)*7;
  ctx.fillStyle=flagCol[LV.wt]||'#ff3333';
  ctx.beginPath();
  ctx.moveTo(x+17,y+4);
  ctx.lineTo(x+44+wave,y+15);
  ctx.lineTo(x+17,y+28);
  ctx.fill();
  // Star on top
  ctx.fillStyle='#FFD700';
  ctx.font='16px monospace';
  ctx.textAlign='left';
  ctx.fillText('★',x+4, y-4+Math.sin(frame*0.04)*3);
}

// ── DRAW PLAYER ──────────────────────────────────────────────
function drawPlayer(){
  if(!player.dead && player.y>H+50) return;
  const x=player.x-camX, y=player.y;
  ctx.globalAlpha=player.dead ? 0.5 : 1;

  // Ground shadow
  if(player.onGround){
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(x+9,y+player.h+1,10,3,0,0,Math.PI*2); ctx.fill();
  }
  // Hat
  ctx.fillStyle='#cc0000';
  ctx.fillRect(x,y,18,7);
  ctx.fillRect(x-2,y+5,22,4);
  // Face
  ctx.fillStyle='#ffcc99'; ctx.fillRect(x,y+8,18,9);
  // Moustache
  ctx.fillStyle='#442200'; ctx.fillRect(x+2,y+14,14,3);
  // Eyes
  ctx.fillStyle='#222'; ctx.fillRect(x+3,y+9,3,3); ctx.fillRect(x+11,y+9,3,3);
  ctx.fillStyle='#fff'; ctx.fillRect(x+4,y+9,2,2);  ctx.fillRect(x+12,y+9,2,2);
  // Overalls
  ctx.fillStyle='#0033cc'; ctx.fillRect(x,y+17,18,5);
  ctx.fillStyle='#cc0000'; ctx.fillRect(x,y+17,6,4); ctx.fillRect(x+12,y+17,6,4);
  // Feet (walk animation)
  ctx.fillStyle='#331100';
  if(player.vx!==0){
    const f=Math.floor(frame/8)%2;
    ctx.fillRect(x+(f?4:-2),y+20,9,4);
    ctx.fillRect(x+(f?9:11),y+20,9,4);
  } else {
    ctx.fillRect(x-2,y+20,9,4);
    ctx.fillRect(x+11,y+20,9,4);
  }
  ctx.globalAlpha=1;
}

// ── DRAW PARTICLES ───────────────────────────────────────────
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x-camX,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── IN-GAME OVERLAY (level name + world tip) ─────────────────
function drawOverlay(){
  ctx.fillStyle='rgba(255,255,255,0.14)';
  ctx.font='bold 9px Courier New';
  ctx.textAlign='left';
  ctx.fillText(LV.name, 8, 16);

  const tips={
    sea:  'FLOATY JUMP — time it carefully',
    space:'LOW GRAVITY — hang in the air',
    mine: 'WATCH the ceiling for bats!',
    land: '',
  };
  if(tips[LV.wt]){
    ctx.fillStyle='rgba(200,200,255,0.13)';
    ctx.font='7px Courier New';
    ctx.fillText(tips[LV.wt], 8, 28);
  }
}

// ── MAIN RENDER ──────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,W,H);

  if(gameState==='worldSelect'){
    drawWorldSelect();
    return;
  }

  drawBG();
  for(const p of LV.sol)    drawSolid(p);
  for(const p of movPlats)  drawMovPlat(p);
  for(const s of(LV.spk||[]))  drawSpike(s);
  for(const lv of(LV.lv||[])) drawLava(lv);
  for(const t of(LV.tr||[]))  drawTramp(t);
  (LV.ib||[]).forEach((ib,i)=>drawInvis(ib,i));
  (LV.co||[]).forEach((c,i) =>drawCoin(c,i));
  drawGoal();
  for(const e of enSt) drawEnemy(e);
  drawPlayer();
  drawParticles();
  drawOverlay();
}

// ── GAME LOOP ────────────────────────────────────────────────
function gameLoop(){
  frame++;

  if(gameState==='playing'){
    updMovPlats();
    updPlayer();
    updEnemies();
    updParticles();
  } else {
    updParticles();
  }

  render();
  mouseClicked=false; // reset after render so world select can read it
  requestAnimationFrame(gameLoop);
}

// ── BOOT ─────────────────────────────────────────────────────
goWorldSelect();
requestAnimationFrame(gameLoop);
</script>
</body>
